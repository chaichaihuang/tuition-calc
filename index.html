<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>课时费计算工具</title>
<style>
  :root {
    --primary: #4f46e5;
    --primary-light: #eef2ff;
    --success: #16a34a;
    --danger: #dc2626;
    --warning: #f59e0b;
    --bg: #f1f5f9;
    --card: #ffffff;
    --border: #e2e8f0;
    --text: #1e293b;
    --text-secondary: #64748b;
    --radius: 10px;
    --shadow: 0 1px 3px rgba(0,0,0,0.06);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
    -webkit-tap-highlight-color: transparent;
  }

  /* ===== 顶部 ===== */
  .topbar {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 0 16px;
    height: 50px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: var(--shadow);
  }
  .topbar .logo {
    font-size: 16px;
    font-weight: 700;
    color: var(--primary);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .topbar .logo span { font-size: 20px; }
  .topbar-actions { display: flex; gap: 6px; }

  /* ===== 按钮 ===== */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    padding: 7px 14px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.15s;
    white-space: nowrap;
    font-family: inherit;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--primary); color: #fff; border-color: var(--primary); }
  .btn-primary:hover { background: #4338ca; }
  .btn-outline { background: #fff; color: var(--text); border-color: var(--border); }
  .btn-outline:hover { background: #f8fafc; }
  .btn-success { background: var(--success); color: #fff; }
  .btn-success:hover { background: #15803d; }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-danger:hover { background: #b91c1c; }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn-xs { padding: 4px 8px; font-size: 11px; border-radius: 6px; }
  .btn-block { width: 100%; }
  .btn-lg { padding: 10px 20px; font-size: 15px; }

  /* ===== 桌面端布局 ===== */
  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 16px;
    display: grid;
    grid-template-columns: 220px 1fr;
    grid-template-rows: auto 1fr;
    gap: 12px;
    min-height: calc(100vh - 50px);
  }

  /* ===== 左侧学生列表 ===== */
  .sidebar {
    grid-row: 1 / 3;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .sidebar-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    flex: 1;
    min-height: 0;
    overflow: hidden;
  }
  .sidebar-card-header {
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .student-list {
    flex: 1;
    overflow-y: auto;
    padding: 4px 0;
    -webkit-overflow-scrolling: touch;
  }
  .student-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 12px;
    cursor: pointer;
    transition: background 0.1s;
    border-left: 3px solid transparent;
    gap: 6px;
    font-size: 14px;
  }
  .student-item:hover { background: #f8fafc; }
  .student-item.active {
    background: var(--primary-light);
    border-left-color: var(--primary);
    font-weight: 600;
  }
  .student-item .s-name {
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .student-item .s-delete {
    opacity: 0;
    color: var(--danger);
    cursor: pointer;
    font-size: 18px;
    padding: 2px 6px;
    border-radius: 4px;
    background: none;
    border: none;
    line-height: 1;
  }
  .student-item:hover .s-delete { opacity: 0.6; }
  .student-item .s-delete:hover { opacity: 1; background: #fef2f2; }
  .add-student-row {
    padding: 10px 12px;
    display: flex;
    gap: 6px;
    border-top: 1px solid var(--border);
  }
  .add-student-row input {
    flex: 1;
    padding: 8px 10px;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    font-size: 13px;
    font-family: inherit;
    min-width: 0;
  }
  .add-student-row input:focus { outline: none; border-color: var(--primary); }
  .empty-students {
    padding: 28px 12px;
    text-align: center;
    color: #94a3b8;
    font-size: 13px;
  }

  /* ===== 右侧上：汇总 ===== */
  .top-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }
  .info-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    box-shadow: var(--shadow);
  }
  .info-card .ic-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-secondary);
    letter-spacing: 0.3px;
    margin-bottom: 2px;
  }
  .info-card .ic-value {
    font-size: 20px;
    font-weight: 700;
  }
  .info-card.highlight {
    background: linear-gradient(135deg, #4f46e5, #6366f1);
    border-color: transparent;
  }
  .info-card.highlight .ic-label,
  .info-card.highlight .ic-value { color: #fff; }

  /* ===== 右侧下：登记表 ===== */
  .main-section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-height: 0;
  }
  .main-header {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
  }
  .main-header .header-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .main-header h3 { font-size: 14px; font-weight: 600; }
  .main-header select, .main-header input[type="month"] {
    padding: 6px 8px;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    font-size: 13px;
    font-family: inherit;
    background: #fff;
  }
  .main-header select:focus, .main-header input:focus { outline: none; border-color: var(--primary); }
  .header-right { display: flex; gap: 5px; flex-wrap: wrap; }

  .table-wrapper {
    flex: 1;
    overflow: auto;
    min-height: 0;
    -webkit-overflow-scrolling: touch;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  table thead { position: sticky; top: 0; z-index: 10; }
  table thead th {
    background: #f8fafc;
    padding: 8px 6px;
    text-align: left;
    font-weight: 600;
    color: var(--text-secondary);
    font-size: 11px;
    letter-spacing: 0.2px;
    border-bottom: 2px solid var(--border);
    white-space: nowrap;
  }
  table tbody td {
    padding: 5px 6px;
    border-bottom: 1px solid #f1f5f9;
    vertical-align: middle;
  }
  table tbody tr:hover { background: #f8fafc; }
  table tbody tr.attended { background: #f0fdf4; }
  table tbody tr.attended:hover { background: #dcfce7; }
  /* 同一天多节课：第一行有日期，后续行日期/日/星期留空 */
  table tbody tr.date-first td.day-col,
  table tbody tr.date-first td.date-col,
  table tbody tr.date-first td.weekday-col { font-weight: 600; }
  table tbody tr.date-continue td.day-col,
  table tbody tr.date-continue td.date-col,
  table tbody tr.date-continue td.weekday-col { color: transparent; user-select: none; }

  .day-col { width: 32px; text-align: center; font-weight: 600; font-size: 13px; }
  .date-col { width: 95px; color: var(--text-secondary); font-size: 11px; }
  .weekday-col { width: 42px; font-size: 11px; color: var(--text-secondary); }
  .toggle-col { width: 60px; text-align: center; }
  .content-col { min-width: 120px; }
  .lessons-col { width: 54px; text-align: center; }
  .price-col { width: 68px; text-align: center; }
  .fee-col { width: 80px; text-align: right; font-weight: 600; color: var(--primary); font-size: 12px; }
  .act-col { width: 70px; text-align: center; }

  /* Toggle */
  .toggle-switch { position: relative; display: inline-block; width: 38px; height: 22px; }
  .toggle-switch input { opacity: 0; width: 0; height: 0; }
  .toggle-slider {
    position: absolute; cursor: pointer;
    top: 0; left: 0; right: 0; bottom: 0;
    background: #cbd5e1; transition: 0.25s; border-radius: 22px;
  }
  .toggle-slider:before {
    content: ""; position: absolute;
    height: 16px; width: 16px; left: 3px; bottom: 3px;
    background: #fff; transition: 0.25s; border-radius: 50%;
    box-shadow: 0 1px 2px rgba(0,0,0,0.15);
  }
  input:checked + .toggle-slider { background: var(--success); }
  input:checked + .toggle-slider:before { transform: translateX(16px); }

  .content-input, .lessons-input {
    width: 100%; padding: 5px 6px;
    border: 1px solid var(--border); border-radius: 5px;
    font-size: 12px; font-family: inherit;
  }
  .content-input:focus, .lessons-input:focus, .price-input:focus { outline: none; border-color: var(--primary); }
  .lessons-input { text-align: center; }
  .price-input { text-align: center; width: 100%; padding: 5px 2px; border: 1px solid var(--border); border-radius: 5px; font-size: 12px; font-family: inherit; background: #fefce8; }

  .empty-row td { text-align: center; color: #94a3b8; padding: 28px; font-size: 13px; }

  /* 添加课时按钮 */
  .btn-add-lesson {
    background: #dcfce7; color: #15803d; border: 1px dashed #86efac;
    padding: 2px 6px; font-size: 11px; border-radius: 4px; cursor: pointer;
    font-family: inherit; white-space: nowrap;
  }
  .btn-add-lesson:hover { background: #bbf7d0; }
  .btn-del-lesson {
    background: none; border: none; color: var(--danger);
    font-size: 16px; cursor: pointer; padding: 0 4px; line-height: 1;
    opacity: 0.4;
  }
  .btn-del-lesson:hover { opacity: 1; }

  /* 底部结算栏 */
  .settle-bar {
    padding: 10px 14px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
    background: #fafbfc;
  }
  .settle-bar .settle-left { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .settle-bar label { font-size: 12px; color: var(--text-secondary); white-space: nowrap; }
  .settle-bar input[type="date"] {
    padding: 5px 8px; border: 1.5px solid var(--border); border-radius: 6px;
    font-size: 12px; font-family: inherit; width: 125px;
  }
  .settle-bar input[type="date"]:focus { outline: none; border-color: var(--primary); }
  .settle-bar .settle-right { display: flex; gap: 6px; align-items: center; }
  .fee-input-inline {
    display: flex; align-items: center; gap: 0;
  }
  .fee-input-inline span {
    background: #f1f5f9; padding: 5px 8px; border: 1.5px solid var(--border);
    border-right: none; border-radius: 6px 0 0 6px; font-size: 12px; color: var(--text-secondary);
  }
  .fee-input-inline input {
    width: 72px; padding: 5px 6px; border: 1.5px solid var(--border);
    border-radius: 0 6px 6px 0; font-size: 13px; text-align: right; font-family: inherit;
  }
  .fee-input-inline input:focus { outline: none; border-color: var(--primary); }

  /* 弹窗 */
  .modal-overlay {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(15,23,42,0.6); z-index: 200;
    align-items: center; justify-content: center; padding: 16px;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: #fff; border-radius: 12px; max-width: 800px; width: 100%;
    max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 50px rgba(0,0,0,0.2);
  }
  .modal-header {
    padding: 16px 20px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; background: #fff; z-index: 1;
  }
  .modal-header h3 { font-size: 16px; }
  .modal-close {
    background: none; border: none; font-size: 22px; cursor: pointer;
    color: var(--text-secondary); padding: 4px 8px; border-radius: 6px;
  }
  .modal-close:hover { background: #f1f5f9; }
  .modal-body { padding: 20px; }
  .modal-footer {
    padding: 14px 20px; border-top: 1px solid var(--border);
    display: flex; gap: 8px; justify-content: flex-end;
    position: sticky; bottom: 0; background: #fff;
  }

  /* 结算单样式 */
  .settlement-preview { font-size: 13px; }
  .settlement-preview .s-header {
    text-align: center; margin-bottom: 20px; padding-bottom: 14px;
    border-bottom: 2px solid #1e293b;
  }
  .settlement-preview .s-header h2 { font-size: 20px; margin-bottom: 2px; }
  .settlement-preview .s-header p { color: var(--text-secondary); font-size: 12px; }
  .settlement-preview .s-info {
    display: grid; grid-template-columns: 1fr 1fr; gap: 4px 20px;
    margin-bottom: 18px; font-size: 13px;
  }
  .settlement-preview .s-info dt { color: var(--text-secondary); font-weight: 500; }
  .settlement-preview .s-info dd { font-weight: 600; margin-left: 0; }
  .settlement-preview .s-table {
    width: 100%; border-collapse: collapse; margin-bottom: 18px; font-size: 12px;
  }
  .settlement-preview .s-table th, .settlement-preview .s-table td {
    padding: 6px 8px; border: 1px solid #d1d5db; text-align: left;
  }
  .settlement-preview .s-table th { background: #f1f5f9; font-weight: 600; }
  .settlement-preview .s-total {
    text-align: right; font-size: 16px; font-weight: 700;
    padding: 10px 0; border-top: 2px solid #1e293b;
  }
  .settlement-preview .s-total span { color: var(--primary); font-size: 22px; }

  @media print {
    body { background: #fff; }
    .topbar, .container, .mobile-tabs, .modal-overlay { display: none !important; }
    .print-area { display: block !important; padding: 0; }
  }

  /* Toast */
  .toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
    background: #1e293b; color: #fff; padding: 10px 20px; border-radius: 8px;
    font-size: 13px; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; }

  /* 徽章 */
  .badge {
    display: inline-block; padding: 1px 7px; border-radius: 8px;
    font-size: 11px; font-weight: 500;
  }
  .badge-active { background: #dcfce7; color: #15803d; }

  /* ============================== */
  /* ===== 手机端适配 ===== */
  /* ============================== */
  @media (max-width: 768px) {
    .container {
      grid-template-columns: 1fr;
      grid-template-rows: auto auto;
      padding: 8px;
      gap: 8px;
      padding-bottom: 70px;
    }

    .sidebar { display: none; }
    .sidebar.mobile-show {
      display: flex;
      grid-row: 1 / 3;
    }

    .top-row {
      grid-template-columns: repeat(2, 1fr);
      gap: 6px;
    }
    .info-card { padding: 10px 12px; }
    .info-card .ic-value { font-size: 18px; }

    .topbar { padding: 0 10px; height: 44px; }
    .topbar .logo { font-size: 14px; }
    .topbar .logo span { font-size: 18px; }
    .topbar-actions .btn { padding: 4px 8px; font-size: 11px; }

    .main-header { padding: 8px 10px; }
    .main-header h3 { font-size: 13px; }
    .settle-bar { padding: 8px 10px; }

    .day-col { width: 26px; font-size: 12px; }
    .date-col { width: 72px; font-size: 10px; }
    .weekday-col { display: none; }
    .toggle-col { width: 48px; }
    .content-col { min-width: 80px; }
    .lessons-col { width: 40px; }
    .price-col { width: 52px; }
    .fee-col { width: 60px; font-size: 11px; }
    .act-col { width: 52px; }

    .toggle-switch { width: 36px; height: 20px; }
    .toggle-slider:before { height: 14px; width: 14px; left: 3px; bottom: 3px; }
    input:checked + .toggle-slider:before { transform: translateX(16px); }

    .settle-bar { flex-direction: column; align-items: stretch; }
    .settle-bar .settle-left { justify-content: center; }
    .settle-bar .settle-right { justify-content: center; }
    .settle-bar input[type="date"] { width: 115px; font-size: 11px; }

    .modal-overlay { padding: 0; }
    .modal {
      max-width: 100%;
      max-height: 100vh;
      border-radius: 0;
    }
    .settlement-preview .s-info { grid-template-columns: 1fr; }

    .mobile-tabs {
      display: flex;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--card);
      border-top: 1px solid var(--border);
      z-index: 150;
      box-shadow: 0 -2px 8px rgba(0,0,0,0.06);
      height: 56px;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .mobile-tab {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      border: none;
      background: none;
      font-size: 10px;
      color: var(--text-secondary);
      cursor: pointer;
      font-family: inherit;
      -webkit-tap-highlight-color: transparent;
      transition: color 0.15s;
    }
    .mobile-tab .tab-icon { font-size: 20px; }
    .mobile-tab.active { color: var(--primary); font-weight: 600; }

    .student-sheet {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: var(--bg);
      z-index: 180;
      flex-direction: column;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .student-sheet.active { display: flex; }
    .student-sheet-header {
      background: var(--card);
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 15px;
      font-weight: 600;
    }
    .student-sheet-body {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
      -webkit-overflow-scrolling: touch;
    }
    .student-sheet-body .student-item {
      padding: 14px 16px;
      font-size: 15px;
      border-bottom: 1px solid #f1f5f9;
    }
    .student-sheet-body .student-item .s-delete { opacity: 0.4; }
    .student-sheet-footer {
      padding: 12px 16px;
      background: var(--card);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
    }
    .student-sheet-footer input {
      flex: 1;
      padding: 10px 12px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
    }
    .student-sheet-footer input:focus { outline: none; border-color: var(--primary); }
  }

  @media (min-width: 769px) {
    .mobile-tabs { display: none; }
    .student-sheet { display: none; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo"><span>📚</span> <span id="topbarStudentName">课时费计算</span></div>
  <div class="topbar-actions">
    <span id="saveIndicator" style="display:inline-flex;align-items:center;gap:4px;font-size:11px;color:#16a34a;margin-right:4px;">💾 已保存</span>
    <button class="btn btn-outline btn-sm" onclick="exportAllData()" title="备份数据到文件（建议每周备份一次）">💾 备份</button>
    <button class="btn btn-outline btn-sm" onclick="importDataPrompt()" title="从备份文件恢复">📥 恢复</button>
  </div>
</div>

<div class="container">

  <!-- ===== 左侧：学生列表（桌面端） ===== -->
  <div class="sidebar" id="desktopSidebar">
    <div class="sidebar-card">
      <div class="sidebar-card-header">
        👥 学生
        <span class="badge badge-active" id="studentCount">0</span>
      </div>
      <div class="student-list" id="studentList">
        <div class="empty-students">还没有学生<br>👇 下方添加</div>
      </div>
      <div class="add-student-row">
        <input type="text" id="newStudentInput" placeholder="学生姓名" onkeydown="if(event.key==='Enter')addStudent()">
        <button class="btn btn-primary btn-xs" onclick="addStudent()">+</button>
      </div>
    </div>
  </div>

  <!-- ===== 右侧上：汇总 ===== -->
  <div class="top-row" id="summaryRow">
    <div class="info-card">
      <div class="ic-label">📅 月份</div>
      <div class="ic-value" id="summaryMonth">-</div>
    </div>
    <div class="info-card">
      <div class="ic-label">📖 上课节数</div>

<div class="print-area" id="printArea" style="display:none;"></div>

<script>
// ============================================================
// 数据模型 v3：支持一天多节课
// records: { "YYYY-MM-DD": [ {content, lessons, customFee}, ... ] }
//   出勤判断：数组长度 > 0 即视为出勤
//   老数据 v2 兼容：{attended,content,lessons,customFee} → 自动迁移
// ============================================================
const STORAGE_KEY = 'tution_calc_v3';
let appData = { students: [] };
let currentStudentId = null;

// ===== 数据迁移 =====
function migrateStudentRecords(student) {
  if (!student.records) { student.records = {}; return; }
  const migrated = {};
  for (const [ds, val] of Object.entries(student.records)) {
    if (Array.isArray(val)) {
      // 已经是 v3 格式
      migrated[ds] = val;
    } else if (typeof val === 'object' && val !== null) {
      // v2 格式 {attended,content,lessons,customFee}
      if (val.attended) {
        migrated[ds] = [{ content: val.content||'', lessons: val.lessons||1, customFee: (val.customFee!=null&&val.customFee!=='') ? val.customFee : null }];
      } else {
        migrated[ds] = [];
      }
    } else {
      migrated[ds] = [];
    }
  }
  student.records = migrated;
}

// ===== 初始化 =====
(function init() {
  loadData();
  // 迁移所有学生数据
  appData.students.forEach(migrateStudentRecords);
  renderStudentList();
  const now = new Date();
  document.getElementById('monthPicker').value = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0');
  const y = now.getFullYear(), m = now.getMonth();
  document.getElementById('settleStart').value = y + '-' + String(m+1).padStart(2,'0') + '-01';
  const lastDay = new Date(y, m+1, 0).getDate();
  document.getElementById('settleEnd').value = y + '-' + String(m+1).padStart(2,'0') + '-' + String(lastDay).padStart(2,'0');
  document.getElementById('settleStartMobile').value = document.getElementById('settleStart').value;
  document.getElementById('settleEndMobile').value = document.getElementById('settleEnd').value;
  document.getElementById('feeInputMobile').value = '700';

  if (appData.students.length > 0) {
    selectStudent(appData.students[0].id);
    let totalRecords = 0;
    appData.students.forEach(s => { for (const arr of Object.values(s.records||{})) totalRecords += arr.length; });
    showToast('✅ 已加载 ' + appData.students.length + ' 名学生，' + totalRecords + ' 条记录');
  } else {
    renderTable();
    showToast('👋 欢迎！请先添加学生开始登记');
  }
})();

// ===== 数据读写 =====
function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) { const p = JSON.parse(raw); if (p && Array.isArray(p.students)) appData = p; }
    // 也尝试读取旧 key
    if (!appData.students.length) {
      const oldRaw = localStorage.getItem('tution_calc_v2');
      if (oldRaw) { const p = JSON.parse(oldRaw); if (p && Array.isArray(p.students)) appData = p; }
    }
  } catch(e) { appData = { students: [] }; }
}
function saveData() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));
    const ind = document.getElementById('saveIndicator');
    if (ind) {
      ind.textContent = '✅ 已保存';
      ind.style.color = '#16a34a';
      clearTimeout(ind._timeout);
      ind._timeout = setTimeout(() => { ind.textContent = '💾 已保存'; ind.style.color = '#16a34a'; }, 1500);
    }
  } catch(e) {
    const ind = document.getElementById('saveIndicator');
    if (ind) { ind.textContent = '⚠ 保存失败'; ind.style.color = '#dc2626'; }
  }
}

// ===== 学生 =====
function getStudent(id) { return appData.students.find(s => s.id === id); }
function getCurrentStudent() { return currentStudentId ? getStudent(currentStudentId) : null; }

function addStudent() {
  const input = document.getElementById('newStudentInput');
  const name = input.value.trim();
  _addStudent(name);
  input.value = '';
}
function addStudentMobile() {
  const input = document.getElementById('newStudentInputMobile');
  const name = input.value.trim();
  _addStudent(name);
  input.value = '';
}
function _addStudent(name) {
  if (!name) { showToast('请输入学生姓名'); return; }
  if (appData.students.some(s => s.name === name)) { showToast('该学生已存在'); return; }
  const student = { id: 's_' + Date.now(), name, feePerClass: 700, records: {} };
  appData.students.push(student);
  saveData();
  renderStudentList();
  selectStudent(student.id);
  showToast('已添加：' + name);
}

function deleteStudent(id, name) {
  if (!confirm(`确定删除「${name}」及所有记录？`)) return;
  appData.students = appData.students.filter(s => s.id !== id);
  if (currentStudentId === id) currentStudentId = appData.students.length > 0 ? appData.students[0].id : null;
  saveData();
  renderStudentList();
  if (currentStudentId) selectStudent(currentStudentId);
  else { renderTable(); clearSummary(); }
  showToast('已删除：' + name);
}

function selectStudent(id) {
  currentStudentId = id;
  renderStudentList();
  const s = getStudent(id);
  if (s) {
    document.getElementById('feeInput').value = s.feePerClass;
    document.getElementById('feeInputMobile').value = s.feePerClass;
  }
  updateSettleStudentNames();
  renderTable();
  updateSummary();
  if (window.innerWidth <= 768) switchMobileTab('main');
}

function renderStudentList() {
  const list = document.getElementById('studentList');
  const countEl = document.getElementById('studentCount');
  countEl.textContent = appData.students.length;
  if (appData.students.length === 0) {
    list.innerHTML = '<div class="empty-students">还没有学生<br>👇 下方添加</div>';
  } else {
    list.innerHTML = appData.students.map(s =>
      `<div class="student-item${s.id===currentStudentId?' active':''}" onclick="selectStudent('${s.id}')">
        <span class="s-name">👤 ${escHtml(s.name)}</span>
        <button class="s-delete" onclick="event.stopPropagation();deleteStudent('${s.id}','${escHtml(s.name)}')">×</button>
      </div>`
    ).join('');
  }
  const sheetBody = document.getElementById('studentSheetBody');
  if (sheetBody) {
    if (appData.students.length === 0) {
      sheetBody.innerHTML = '<div class="empty-students">还没有添加学生</div>';
    } else {
      sheetBody.innerHTML = appData.students.map(s =>
        `<div class="student-item${s.id===currentStudentId?' active':''}" onclick="selectStudent('${s.id}');closeStudentSheet();">
          <span class="s-name">👤 ${escHtml(s.name)}</span>
          <button class="s-delete" onclick="event.stopPropagation();deleteStudent('${s.id}','${escHtml(s.name)}')">×</button>
        </div>`
      ).join('');
    }
  }
}

// ===== 手机端 Tab =====
function switchMobileTab(tab) {
  document.querySelectorAll('.mobile-tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.mobile-tab[data-tab="${tab}"]`).classList.add('active');
  if (tab === 'students') openStudentSheet();
  else if (tab === 'settle') openSettleSheet();
  else { closeStudentSheet(); closeSettleSheet(); }
}
function openStudentSheet() { renderStudentList(); document.getElementById('studentSheet').classList.add('active'); }
function closeStudentSheet() { document.getElementById('studentSheet').classList.remove('active'); }
function openSettleSheet() {
  document.getElementById('settleStartMobile').value = document.getElementById('settleStart').value;
  document.getElementById('settleEndMobile').value = document.getElementById('settleEnd').value;
  document.getElementById('feeInputMobile').value = document.getElementById('feeInput').value;
  updateSettleStudentNames();
  updateSettlePreviewMobile();
  document.getElementById('settleSheet').classList.add('active');
}
function closeSettleSheet() { document.getElementById('settleSheet').classList.remove('active'); }
function syncSettleDates() {
  document.getElementById('settleStart').value = document.getElementById('settleStartMobile').value;
  document.getElementById('settleEnd').value = document.getElementById('settleEndMobile').value;
  onSettleChange();
}
function syncFeeMobile() {
  const v = document.getElementById('feeInputMobile').value;
  document.getElementById('feeInput').value = v;
  onFeeChange();
}
function updateSettlePreviewMobile() {
  const student = getCurrentStudent();
  updateSettleStudentNames();
  if (!student) { document.getElementById('settlePreviewMobile').textContent = '请先选择学生'; return; }
  const s = document.getElementById('settleStartMobile').value;
  const e = document.getElementById('settleEndMobile').value;
  const stats = countRecordsInRange(student, s, e);
  document.getElementById('settlePreviewMobile').textContent =
    `${stats.days}天 · ${stats.lessons}节 · ¥${stats.fee.toFixed(0)}`;
}

// ===== 表格渲染（支持一天多行） =====
function getMonthStr() { return document.getElementById('monthPicker').value; }
function onMonthChange() { renderTable(); updateSummary(); }

function onFeeChange() {
  const s = getCurrentStudent(); if (!s) return;
  s.feePerClass = parseInt(document.getElementById('feeInput').value) || 0;
  document.getElementById('feeInputMobile').value = s.feePerClass;
  saveData(); updateSummary(); updateAllDayFees();
}

function onSettleChange() {
  document.getElementById('settleStartMobile').value = document.getElementById('settleStart').value;
  document.getElementById('settleEndMobile').value = document.getElementById('settleEnd').value;
  updateSettlePreview();
  updateSettlePreviewMobile();
}

// 获取某一天的课时记录数组（确保为数组）
function getDayRecords(student, dateStr) {
  if (!student || !student.records) return [];
  const v = student.records[dateStr];
  if (Array.isArray(v)) return v;
  return [];
}

// 确保某一天有数组
function ensureDayRecords(student, dateStr) {
  if (!student.records) student.records = {};
  if (!Array.isArray(student.records[dateStr])) student.records[dateStr] = [];
  return student.records[dateStr];
}

// 某天是否出勤
function isAttended(student, dateStr) {
  const arr = getDayRecords(student, dateStr);
  return arr.length > 0;
}

// 获取某条记录的单价
function getRecordPrice(rec, defaultFee) {
  return (rec.customFee != null && rec.customFee !== '' && rec.customFee > 0) ? rec.customFee : defaultFee;
}

function renderTable() {
  const tbody = document.getElementById('attendanceBody');
  const student = getCurrentStudent();
  const month = getMonthStr();
  if (!student) {
    tbody.innerHTML = '<tr class="empty-row"><td colspan="9">👈 请先选择学生</td></tr>';
    document.getElementById('summaryMonth').textContent = '-';
    return;
  }
  if (!month) {
    tbody.innerHTML = '<tr class="empty-row"><td colspan="9">请选择月份</td></tr>';
    return;
  }
  document.getElementById('summaryMonth').textContent = month;

  const [year, mn] = month.split('-').map(Number);
  const daysInMonth = new Date(year, mn, 0).getDate();
  const weekDays = ['日','一','二','三','四','五','六'];
  const defaultFee = student.feePerClass;
  let html = '';

  for (let day = 1; day <= daysInMonth; day++) {
    const d = new Date(year, mn - 1, day);
    const dateStr = year + '-' + String(mn).padStart(2,'0') + '-' + String(day).padStart(2,'0');
    const wd = weekDays[d.getDay()];
    const isWeekend = d.getDay() === 0 || d.getDay() === 6;
    const records = getDayRecords(student, dateStr);
    const attended = records.length > 0;

    if (records.length === 0) {
      // 无记录：显示空行
      html += `<tr data-date="${dateStr}" data-idx="0">
        <td class="day-col">${day}</td>
        <td class="date-col">${dateStr}</td>
        <td class="weekday-col" style="color:${isWeekend?'#dc2626':'inherit'}">周${wd}</td>
        <td class="toggle-col">
          <label class="toggle-switch">
            <input type="checkbox" onchange="toggleAttend('${dateStr}',this.checked)">
            <span class="toggle-slider"></span>
          </label>
        </td>
        <td class="content-col"><input class="content-input" placeholder="上课内容…" disabled></td>
        <td class="lessons-col"><input type="number" class="lessons-input" value="1" min="0.5" max="20" step="0.5" disabled></td>
        <td class="price-col"><input type="number" class="price-input" value="" placeholder="${defaultFee}" min="0" step="1" disabled></td>
        <td class="fee-col" id="dayFee_${dateStr}">-</td>
        <td class="act-col"><button class="btn-add-lesson" onclick="addLessonRow('${dateStr}')" disabled>+课时</button></td>
      </tr>`;
    } else {
      // 有记录：每一条记录一行
      records.forEach((rec, idx) => {
        const isFirst = idx === 0;
        const dayPrice = getRecordPrice(rec, defaultFee);
        const dayFee = '¥' + ((rec.lessons||1) * dayPrice).toFixed(0);
        const rowClass = (isFirst ? 'attended date-first' : 'attended date-continue');

        html += `<tr class="${rowClass}" data-date="${dateStr}" data-idx="${idx}">
          <td class="day-col">${isFirst ? day : ''}</td>
          <td class="date-col">${isFirst ? dateStr : ''}</td>
          <td class="weekday-col" style="color:${isWeekend?'#dc2626':'inherit'}">${isFirst ? '周'+wd : ''}</td>
          <td class="toggle-col">
            ${isFirst ? `<label class="toggle-switch">
              <input type="checkbox" checked onchange="toggleAttend('${dateStr}',this.checked)">
              <span class="toggle-slider"></span>
            </label>` : ''}
          </td>
          <td class="content-col">
            <input class="content-input" value="${escAttr(rec.content||'')}" placeholder="上课内容…" onchange="updateRecContent('${dateStr}',${idx},this.value)">
          </td>
          <td class="lessons-col">
            <input type="number" class="lessons-input" value="${rec.lessons||1}" min="0.5" max="20" step="0.5" onchange="updateRecLessons('${dateStr}',${idx},parseFloat(this.value)||1)">
          </td>
          <td class="price-col">
            <input type="number" class="price-input" value="${rec.customFee!=null?rec.customFee:''}" placeholder="${defaultFee}" min="0" step="1" onchange="updateRecPrice('${dateStr}',${idx},this.value===''?null:parseInt(this.value)||0)">
          </td>
          <td class="fee-col" id="dayFee_${dateStr}_${idx}">${dayFee}</td>
          <td class="act-col">
            <button class="btn-add-lesson" onclick="addLessonRow('${dateStr}')">+课时</button>
            ${records.length > 1 ? `<button class="btn-del-lesson" onclick="delLessonRow('${dateStr}',${idx})" title="删除此课时">×</button>` : ''}
          </td>
        </tr>`;
      });
    }
  }
  tbody.innerHTML = html;
}

// 切换出勤
function toggleAttend(dateStr, attended) {
  const s = getCurrentStudent(); if (!s) return;
  if (attended) {
    // 打开出勤：添加一条默认记录
    const arr = ensureDayRecords(s, dateStr);
    if (arr.length === 0) arr.push({ content: '', lessons: 1, customFee: null });
  } else {
    // 关闭出勤：清空该天所有记录
    if (s.records) s.records[dateStr] = [];
  }
  saveData(); renderTable(); updateSummary();
}

// 追加一条课时记录
function addLessonRow(dateStr) {
  const s = getCurrentStudent(); if (!s) return;
  const arr = ensureDayRecords(s, dateStr);
  arr.push({ content: '', lessons: 1, customFee: null });
  saveData(); renderTable(); updateSummary();
}

// 删除一条课时记录
function delLessonRow(dateStr, idx) {
  const s = getCurrentStudent(); if (!s) return;
  const arr = ensureDayRecords(s, dateStr);
  arr.splice(idx, 1);
  saveData(); renderTable(); updateSummary();
}

// 更新课时内容
function updateRecContent(dateStr, idx, value) {
  const s = getCurrentStudent(); if (!s) return;
  const arr = getDayRecords(s, dateStr);
  if (idx >= 0 && idx < arr.length) { arr[idx].content = value; saveData(); }
}

// 更新节数
function updateRecLessons(dateStr, idx, value) {
  const s = getCurrentStudent(); if (!s) return;
  const arr = getDayRecords(s, dateStr);
  if (idx >= 0 && idx < arr.length) { arr[idx].lessons = value; updateDayFee(dateStr, idx); updateSummary(); saveData(); }
}

// 更新单价
function updateRecPrice(dateStr, idx, value) {
  const s = getCurrentStudent(); if (!s) return;
  const arr = getDayRecords(s, dateStr);
  if (idx >= 0 && idx < arr.length) { arr[idx].customFee = value; updateDayFee(dateStr, idx); updateSummary(); saveData(); }
}

// 更新单条费用显示
function updateDayFee(dateStr, idx) {
  const s = getCurrentStudent(); if (!s) return;
  const cell = document.getElementById('dayFee_' + dateStr + '_' + idx);
  if (!cell) return;
  const arr = getDayRecords(s, dateStr);
  if (idx >= 0 && idx < arr.length) {
    const r = arr[idx];
    const price = getRecordPrice(r, s.feePerClass);
    cell.textContent = '¥' + ((r.lessons||1) * price).toFixed(0);
  }
}

// 更新某天所有费用（默认单价变化时）
function updateAllDayFees() {
  const student = getCurrentStudent();
  const month = getMonthStr();
  if (!student || !month) return;
  const [y,m] = month.split('-').map(Number);
  const days = new Date(y, m, 0).getDate();
  for (let d = 1; d <= days; d++) {
    const ds = y+'-'+String(m).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const arr = getDayRecords(student, ds);
    arr.forEach((_, idx) => updateDayFee(ds, idx));
  }
}

// ===== 统计辅助 =====
function countRecordsInRange(student, start, end) {
  let days = 0, lessons = 0, fee = 0;
  if (student.records) {
    for (const [ds, arr] of Object.entries(student.records)) {
      if ((!start || ds >= start) && (!end || ds <= end) && Array.isArray(arr) && arr.length > 0) {
        days++;
        arr.forEach(r => {
          lessons += r.lessons || 1;
          fee += (r.lessons||1) * getRecordPrice(r, student.feePerClass);
        });
      }
    }
  }
  return { days, lessons, fee };
}

// ===== 汇总 =====
function updateSummary() {
  const s = getCurrentStudent(), month = getMonthStr();
  if (!s || !month) { clearSummary(); return; }
  document.getElementById('summaryMonth').textContent = month;
  let attendedDays = 0, totalLessons = 0, totalFee = 0;
  if (s.records) {
    for (const [ds, arr] of Object.entries(s.records)) {
      if (ds.startsWith(month) && Array.isArray(arr) && arr.length > 0) {
        attendedDays++;
        arr.forEach(r => {
          totalLessons += r.lessons || 1;
          totalFee += (r.lessons||1) * getRecordPrice(r, s.feePerClass);
        });
      }
    }
  }
  document.getElementById('summaryLessons').textContent = totalLessons;
  document.getElementById('summaryDays').textContent = attendedDays;
  document.getElementById('summaryFee').textContent = '¥' + totalFee.toFixed(0);
  updateSettlePreview();
  updateSettlePreviewMobile();
}
function clearSummary() {
  document.getElementById('summaryMonth').textContent = '-';
  document.getElementById('summaryLessons').textContent = '0';
  document.getElementById('summaryDays').textContent = '0';
  document.getElementById('summaryFee').textContent = '¥0';
}
function updateSettleStudentNames() {
  const s = getCurrentStudent();
  const name = s ? s.name : '未选择';
  const displayName = s ? s.name + '-课时费计算' : '课时费计算';
  document.getElementById('settleStudentName').textContent = name;
  document.getElementById('settleStudentNameMobile').textContent = name;
  document.getElementById('topbarStudentName').textContent = displayName;
}
function updateSettlePreview() {
  const s = getCurrentStudent(); if (!s) return;
  updateSettleStudentNames();
  const start = document.getElementById('settleStart').value;
  const end = document.getElementById('settleEnd').value;
  const stats = countRecordsInRange(s, start, end);
  document.getElementById('settlePreview').textContent =
    `${stats.days}天 · ${stats.lessons}节 · ¥${stats.fee.toFixed(0)}`;
}

// ===== 批量操作 =====
function markAllAttended() {
  const s = getCurrentStudent(), month = getMonthStr();
  if (!s || !month) { showToast('请先选择学生和月份'); return; }
  if (!confirm('将本月所有日期标记为出勤（每天1节）？')) return;
  if (!s.records) s.records = {};
  const [y,m] = month.split('-').map(Number);
  const days = new Date(y, m, 0).getDate();
  for (let d = 1; d <= days; d++) {
    const ds = y+'-'+String(m).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    if (!Array.isArray(s.records[ds]) || s.records[ds].length === 0) {
      s.records[ds] = [{ content: '', lessons: 1, customFee: null }];
    }
  }
  saveData(); renderTable(); updateSummary();
  showToast('已标记全部出勤 ✓');
}
function batchSetLessons() {
  const s = getCurrentStudent(), month = getMonthStr();
  if (!s || !month) { showToast('请先选择学生和月份'); return; }
  const v = prompt('统一节数（如 1、1.5、2）：', '1');
  if (v === null) return;
  const n = parseFloat(v);
  if (isNaN(n) || n <= 0) { showToast('请输入有效节数'); return; }
  if (!s.records) s.records = {};
  let cnt = 0;
  for (const [ds, arr] of Object.entries(s.records)) {
    if (ds.startsWith(month) && Array.isArray(arr)) {
      arr.forEach(r => { r.lessons = n; cnt++; });
    }
  }
  saveData(); renderTable(); updateSummary();
  showToast(`已设置 ${cnt} 条记录为 ${n} 节 ✓`);
}
function copyLastMonth() {
  const s = getCurrentStudent(), month = getMonthStr();
  if (!s || !month) { showToast('请先选择学生和月份'); return; }
  const [y,m] = month.split('-').map(Number);
  let py = y, pm = m - 1;
  if (pm === 0) { pm = 12; py--; }
  const prevMonth = py+'-'+String(pm).padStart(2,'0');
  let copied = 0;
  if (s.records) {
    for (const [ds, arr] of Object.entries(s.records)) {
      if (ds.startsWith(prevMonth) && Array.isArray(arr) && arr.length > 0) {
        const dayPart = ds.substring(8);
        const newDs = month + '-' + dayPart;
        const maxDay = new Date(y, m, 0).getDate();
        if (parseInt(dayPart) <= maxDay) {
          s.records[newDs] = arr.map(r => ({ content: r.content||'', lessons: r.lessons||1, customFee: r.customFee }));
          copied += arr.length;
        }
      }
    }
  }
  if (copied === 0) { showToast('上月无出勤记录'); }
  else { saveData(); renderTable(); updateSummary(); showToast(`已复制 ${copied} 条记录 ✓`); }
}

// ===== 结算单 =====
function buildSettlementHTML() {
  const s = getCurrentStudent();
  if (!s) return '<p style="text-align:center;color:#94a3b8;padding:40px">请先选择学生</p>';
  const start = document.getElementById('settleStart').value;
  const end = document.getElementById('settleEnd').value;
  const defaultFee = s.feePerClass;
  const rangeLabel = (start&&end) ? `${start} 至 ${end}` : '未设置';
  const flatRecords = [];
  let totalLessons = 0, totalFee = 0;
  if (s.records) {
    for (const [ds, arr] of Object.entries(s.records)) {
      if ((!start||ds>=start) && (!end||ds<=end) && Array.isArray(arr)) {
        arr.forEach((r, idx) => {
          const price = getRecordPrice(r, defaultFee);
          flatRecords.push({ date: ds, subIdx: idx, content: r.content||'', lessons: r.lessons||1, price: price });
          totalLessons += r.lessons || 1;
          totalFee += (r.lessons||1) * price;
        });
      }
    }
  }
  flatRecords.sort((a,b) => a.date.localeCompare(b.date) || a.subIdx - b.subIdx);
  const weekDays = ['日','一','二','三','四','五','六'];

  let rows = '';
  flatRecords.forEach((r,i) => {
    const d = new Date(r.date+'T00:00:00');
    const isCustomPrice = r.price !== defaultFee;
    const feeHtml = isCustomPrice
      ? `<span style="font-size:10px;color:var(--danger)">¥${r.price}×${r.lessons}节</span><br>¥${(r.lessons*r.price).toFixed(0)}`
      : `¥${(r.lessons*r.price).toFixed(0)}`;
    rows += `<tr>
      <td>${i+1}</td><td>${r.date}</td><td>周${weekDays[d.getDay()]}</td>
      <td>${escHtml(r.content||'-')}</td>
      <td>${r.lessons}节</td>
      <td style="text-align:right">${feeHtml}</td>
    </tr>`;
  });
  if (flatRecords.length === 0) {
    rows = '<tr><td colspan="6" style="text-align:center;color:#94a3b8;padding:20px;">该范围内暂无出勤记录</td></tr>';
  }

  return `<div class="settlement-preview">
    <div class="s-header">
      <h2>课时费结算单</h2>
      <p>结算周期：${rangeLabel} &nbsp;|&nbsp; ${new Date().toLocaleDateString('zh-CN')}</p>
    </div>
    <dl class="s-info">
      <dt>学生姓名</dt><dd>${escHtml(s.name)}</dd>
      <dt>结算周期</dt><dd>${rangeLabel}</dd>
      <dt>默认单价</dt><dd>¥${defaultFee} / 节（红色标注为特殊单价）</dd>
      <dt>总节数</dt><dd>${totalLessons} 节（${flatRecords.length} 条记录）</dd>
    </dl>
    <table class="s-table">
      <thead><tr>
        <th style="width:32px">#</th><th style="width:105px">日期</th><th style="width:48px">星期</th>
        <th>上课内容</th><th style="width:56px">节数</th><th style="width:90px">费用</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <div class="s-total">
      应结算总学费：<span>¥${totalFee.toFixed(0)}</span>
    </div>
    <div class="s-footer">
      <p>老师签字：______________ &nbsp;&nbsp;&nbsp; 日期：______________</p>
      <p style="margin-top:8px;">本结算单由「课时费计算工具」自动生成</p>
    </div>
  </div>`;
}

function showPreview() {
  document.getElementById('previewContent').innerHTML = buildSettlementHTML();
  document.getElementById('previewModal').classList.add('active');
}
function closePreview() { document.getElementById('previewModal').classList.remove('active'); }
function printSettlement() {
  const pa = document.getElementById('printArea');
  pa.innerHTML = buildSettlementHTML();
  pa.style.display = 'block';
  setTimeout(() => { window.print(); pa.style.display = 'none'; }, 300);
}
function printFromPreview() { closePreview(); setTimeout(printSettlement, 300); }

// ===== CSV =====
function exportCSV() {
  const s = getCurrentStudent(); if (!s) { showToast('请先选择学生'); return; }
  const start = document.getElementById('settleStart').value;
  const end = document.getElementById('settleEnd').value;
  const defaultFee = s.feePerClass;
  const flatRecords = [];
  let totalLessons = 0, totalFee = 0;
  if (s.records) {
    for (const [ds, arr] of Object.entries(s.records)) {
      if ((!start||ds>=start) && (!end||ds<=end) && Array.isArray(arr)) {
        arr.forEach(r => {
          const price = getRecordPrice(r, defaultFee);
          flatRecords.push({ date: ds, content: r.content||'', lessons: r.lessons||1, price: price });
          totalLessons += r.lessons || 1;
          totalFee += (r.lessons||1) * price;
        });
      }
    }
  }
  flatRecords.sort((a,b) => a.date.localeCompare(b.date));
  let csv = '\uFEFF日期,上课内容,节数,单价(元/节),费用(元)\n';
  flatRecords.forEach(r => csv += `${r.date},"${(r.content||'').replace(/"/g,'""')}",${r.lessons},${r.price},${(r.lessons*r.price).toFixed(0)}\n`);
  csv += `\n合计,,${totalLessons},,${totalFee.toFixed(0)}\n`;
  csv += `学生: ${s.name}, 默认单价: ¥${defaultFee}/节, 范围: ${start||'不限'}~${end||'不限'}`;
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `课时费_${s.name}_${start||''}_${end||''}.csv`; a.click();
  URL.revokeObjectURL(url);
  showToast('CSV已下载 ✓');
}

// ===== 备份恢复 =====
function exportAllData() {
  const blob = new Blob([JSON.stringify(appData,null,2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = '课时费备份_' + new Date().toISOString().slice(0,10) + '.json'; a.click();
  URL.revokeObjectURL(url);
  showToast('备份已下载 ✓');
}
function importDataPrompt() {
  const inp = document.createElement('input');
  inp.type = 'file'; inp.accept = '.json';
  inp.onchange = function(e) {
    const f = e.target.files[0]; if (!f) return;
    const r = new FileReader();
    r.onload = function(ev) {
      try {
        const d = JSON.parse(ev.target.result);
        if (!d.students||!Array.isArray(d.students)) throw new Error();
        if (!confirm(`导入 ${d.students.length} 个学生，覆盖当前数据？`)) return;
        appData = d;
        appData.students.forEach(migrateStudentRecords);
        saveData();
        currentStudentId = appData.students.length>0 ? appData.students[0].id : null;
        renderStudentList();
        if (currentStudentId) selectStudent(currentStudentId); else renderTable();
        showToast('恢复成功 ✓');
      } catch(ex) { showToast('文件格式错误'); }
    };
    r.readAsText(f);
  };
  inp.click();
}
function resetAll() {
  if (!confirm('⚠️ 清空所有数据？建议先备份！')) return;
  appData = { students: [] }; currentStudentId = null; saveData();
  renderStudentList(); renderTable(); clearSummary();
  showToast('已清空');
}

// ===== 工具 =====
function escHtml(s) { const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }
function escAttr(s) { return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._tid); t._tid = setTimeout(() => t.classList.remove('show'), 2000);
}

document.addEventListener('keydown', e => { if (e.key==='Escape') { closePreview(); closeStudentSheet(); closeSettleSheet(); } });
document.getElementById('previewModal').addEventListener('click', function(e) { if (e.target===this) closePreview(); });
</script>
