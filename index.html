<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>课时费计算工具</title>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
:root {
  --primary: #4f46e5; --primary-light: #eef2ff; --primary-dark: #4338ca;
  --success: #16a34a; --success-light: #dcfce7;
  --danger: #dc2626; --danger-light: #fef2f2;
  --warning: #f59e0b; --warning-light: #fffbeb;
  --bg: #f1f5f9; --card: #fff; --border: #e2e8f0;
  --text: #1e293b; --text-secondary: #64748b;
  --radius: 10px; --shadow: 0 1px 3px rgba(0,0,0,0.06);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh;-webkit-tap-highlight-color:transparent}

/* ===== 顶栏 ===== */
.topbar{background:var(--card);border-bottom:1px solid var(--border);padding:0 16px;height:50px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:var(--shadow)}
.topbar .logo{font-size:16px;font-weight:700;color:var(--primary);display:flex;align-items:center;gap:6px}
.topbar .logo span{font-size:20px}
.topbar-actions{display:flex;gap:6px;align-items:center}

/* ===== 按钮 ===== */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:4px;padding:7px 14px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid transparent;transition:all .15s;white-space:nowrap;font-family:inherit;user-select:none}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--primary);color:#fff;border-color:var(--primary)}
.btn-primary:hover{background:var(--primary-dark)}
.btn-outline{background:#fff;color:var(--text);border-color:var(--border)}
.btn-outline:hover{background:#f8fafc}
.btn-success{background:var(--success);color:#fff}
.btn-danger{background:var(--danger);color:#fff}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-xs{padding:4px 8px;font-size:11px;border-radius:6px}
.btn-block{width:100%}
.btn-lg{padding:10px 20px;font-size:15px}
.btn-ghost{background:transparent;border:none;color:var(--text-secondary)}
.btn-ghost:hover{color:var(--primary);background:#f8fafc}
.btn:disabled{opacity:.5;pointer-events:none}

/* ===== 桌面布局 ===== */
.desktop-layout{max-width:1200px;margin:0 auto;padding:16px;display:grid;grid-template-columns:240px 1fr;gap:12px;min-height:calc(100vh - 50px)}
.sidebar{display:flex;flex-direction:column;gap:10px}
.sidebar-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);display:flex;flex-direction:column;flex:1;min-height:0;overflow:hidden}
.sidebar-card-header{padding:12px 14px;border-bottom:1px solid var(--border);font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:space-between}
.main-area{display:flex;flex-direction:column;gap:12px}
.main-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);display:flex;flex-direction:column;overflow:hidden}

/* ===== 学生列表 ===== */
.student-list{flex:1;overflow-y:auto;padding:4px 0;-webkit-overflow-scrolling:touch}
.student-item{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;cursor:pointer;transition:background .1s;border-left:3px solid transparent;gap:6px;font-size:14px}
.student-item:hover{background:#f8fafc}
.student-item.active{background:var(--primary-light);border-left-color:var(--primary);font-weight:600}
.student-item .s-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.student-item .s-delete{opacity:0;color:var(--danger);cursor:pointer;font-size:18px;padding:2px 6px;border-radius:4px;background:none;border:none;line-height:1}
.student-item:hover .s-delete{opacity:.6}
.student-item .s-delete:hover{opacity:1;background:var(--danger-light)}
.add-student-row{padding:10px 12px;display:flex;gap:6px;border-top:1px solid var(--border)}
.add-student-row input{flex:1;padding:8px 10px;border:1.5px solid var(--border);border-radius:6px;font-size:13px;font-family:inherit;min-width:0}
.add-student-row input:focus{outline:none;border-color:var(--primary)}
.empty-students{padding:28px 12px;text-align:center;color:#94a3b8;font-size:13px}

/* ===== 统计卡片 ===== */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;box-shadow:var(--shadow)}
.stat-card .sc-label{font-size:11px;font-weight:600;color:var(--text-secondary);letter-spacing:.3px;margin-bottom:2px}
.stat-card .sc-value{font-size:20px;font-weight:700}
.stat-card.highlight{background:linear-gradient(135deg,#4f46e5,#6366f1);border-color:transparent}
.stat-card.highlight .sc-label,.stat-card.highlight .sc-value{color:#fff}

/* ===== Tab导航（移动端） ===== */
.mobile-tabs{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);z-index:150;box-shadow:0 -2px 8px rgba(0,0,0,.06);height:56px;padding-bottom:env(safe-area-inset-bottom)}
.mobile-tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border:none;background:none;font-size:10px;color:var(--text-secondary);cursor:pointer;font-family:inherit;-webkit-tap-highlight-color:transparent;transition:color .15s}
.mobile-tab .tab-icon{font-size:20px}
.mobile-tab.active{color:var(--primary);font-weight:600}

/* ===== 步骤指示器 ===== */
.steps-indicator{display:flex;align-items:center;justify-content:center;padding:16px 20px;gap:0}
.step-dot{display:flex;align-items:center;gap:0}
.step-circle{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;border:2px solid var(--border);color:var(--text-secondary);background:#fff;transition:all .3s}
.step-circle.done{background:var(--success);border-color:var(--success);color:#fff}
.step-circle.current{background:var(--primary);border-color:var(--primary);color:#fff}
.step-line{width:60px;height:2px;background:var(--border);margin:0 8px;transition:all .3s}
.step-line.done{background:var(--success)}
.step-label{font-size:11px;color:var(--text-secondary);text-align:center;margin-top:4px;white-space:nowrap}
.step-label.current{color:var(--primary);font-weight:600}
.step-dot-wrap{display:flex;flex-direction:column;align-items:center}

/* ===== 排课设置表单 ===== */
.form-section{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.form-section h4{font-size:14px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.form-row{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:10px}
.form-row label{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;min-width:60px}
.form-input{padding:8px 10px;border:1.5px solid var(--border);border-radius:6px;font-size:13px;font-family:inherit;background:#fff}
.form-input:focus{outline:none;border-color:var(--primary)}
.select-wrap{position:relative}
.select-wrap select{padding:8px 10px;border:1.5px solid var(--border);border-radius:6px;font-size:13px;font-family:inherit;background:#fff;appearance:none;padding-right:28px;cursor:pointer}
.select-wrap select:focus{outline:none;border-color:var(--primary)}
.select-wrap::after{content:'▾';position:absolute;right:8px;top:50%;transform:translateY(-50%);pointer-events:none;font-size:12px;color:var(--text-secondary)}

/* ===== 星期选择 ===== */
.weekday-group{display:flex;gap:6px;flex-wrap:wrap}
.weekday-chip{padding:8px 14px;border-radius:20px;border:1.5px solid var(--border);background:#fff;cursor:pointer;font-size:13px;font-weight:500;transition:all .15s;font-family:inherit;white-space:nowrap;user-select:none}
.weekday-chip:hover{border-color:var(--primary);color:var(--primary)}
.weekday-chip.selected{background:var(--primary);color:#fff;border-color:var(--primary)}
.weekday-chip.weekend{border-color:#fecaca;color:#dc2626}
.weekday-chip.weekend.selected{background:var(--primary);color:#fff;border-color:var(--primary)}

/* ===== 学生标签 ===== */
.student-tags{display:flex;flex-wrap:wrap;gap:6px}
.student-tag{display:inline-flex;align-items:center;gap:4px;padding:6px 12px;border-radius:16px;background:var(--primary-light);color:var(--primary-dark);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;border:1.5px solid transparent;user-select:none}
.student-tag:hover{background:#e0e7ff}
.student-tag.selected{border-color:var(--primary);box-shadow:0 0 0 2px rgba(79,70,229,.2)}
.tag-delete{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;border:none;background:rgba(220,38,38,.15);color:#dc2626;font-size:13px;font-weight:700;cursor:pointer;line-height:1;padding:0;margin-left:2px;transition:all .15s;font-family:inherit}
.tag-delete:hover{background:#dc2626;color:#fff}

/* ===== 月历 ===== */
.month-block{margin-bottom:20px}
.month-title{font-size:15px;font-weight:700;color:var(--text);padding:10px 0;border-bottom:2px solid var(--primary);margin-bottom:8px;display:flex;align-items:center;gap:8px}
.month-table{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed}
.month-table thead th{background:#f8fafc;padding:8px 4px;text-align:center;font-weight:600;color:var(--text-secondary);font-size:11px;border-bottom:2px solid var(--border)}
.month-table thead th.weekend{color:#dc2626}
.month-table tbody td{padding:4px;border:1px solid #f1f5f9;vertical-align:top;min-height:80px;position:relative}
.month-table .day-num{font-weight:600;font-size:13px;margin-bottom:2px}
.month-table .day-date{font-size:10px;color:var(--text-secondary);margin-bottom:2px}

/* 上课日 */
.month-table .cell-scheduled{background:#f0fdf4;border:1px solid #bbf7d0}
.month-table .cell-scheduled .day-num{color:#15803d}
.month-table .cell-scheduled .status-label{display:inline-block;padding:1px 6px;border-radius:8px;font-size:10px;font-weight:600;background:#bbf7d0;color:#15803d;margin-bottom:2px}

/* 调课日 */
.month-table .cell-adjust{background:#dbeafe;border:1px solid #93c5fd}
.month-table .cell-adjust .day-num{color:#1e40af}
.month-table .cell-adjust .status-label{display:inline-block;padding:1px 6px;border-radius:8px;font-size:10px;font-weight:600;background:#bfdbfe;color:#1e40af;margin-bottom:2px}

/* 请假日 */
.month-table .cell-absent{background:var(--danger-light);border:1px solid #fecaca}
.month-table .cell-absent .day-num{color:#dc2626}
.month-table .cell-absent .status-label{display:inline-block;padding:1px 6px;border-radius:8px;font-size:10px;font-weight:600;background:#fecaca;color:#dc2626;margin-bottom:2px}

/* 范围内非上课日 */
.month-table .cell-inrange{background:#fafafa}
.month-table .cell-inrange .day-num{color:var(--text-secondary)}

/* 混合状态（部分正常+部分请假/调课） */
.month-table .cell-mixed{background:#fff7ed;border:1px solid #fed7aa}
.month-table .cell-mixed .day-num{color:#c2410c}
.month-table .cell-mixed .status-label{display:inline-block;padding:1px 6px;border-radius:8px;font-size:10px;font-weight:600;background:#fed7aa;color:#c2410c;margin-bottom:2px}

/* 范围外 */
.month-table .cell-outrange{background:#f1f5f9;color:#cbd5e1}
.month-table .cell-outrange .day-num{color:#cbd5e1}

/* 加课日 */
.month-table .cell-makeup{background:#fdf2f8;border:1px solid #f9a8d4}
.month-table .cell-makeup .day-num{color:#9d174d}
.month-table .cell-makeup .status-label{display:inline-block;padding:1px 6px;border-radius:8px;font-size:10px;font-weight:600;background:#fce7f3;color:#9d174d;margin-bottom:2px}

/* 空单元格（补位） */
.month-table .cell-empty{background:#f8fafc}

/* 单元格内元素 */
.cell-content{font-size:11px}
.cell-content .lesson-time{font-size:10px;color:var(--text-secondary);margin-bottom:2px}
.cell-content .content-input{width:100%;padding:2px 4px;border:1px solid #d1d5db;border-radius:4px;font-size:11px;font-family:inherit;background:#fff}
.cell-content .content-input:focus{outline:none;border-color:var(--primary)}
.cell-content .type-select{width:100%;padding:2px 4px;border:1px solid #d1d5db;border-radius:4px;font-size:11px;font-family:inherit;background:#fff;margin-bottom:2px;cursor:pointer}
.cell-content .type-select:focus{outline:none;border-color:var(--primary)}
.cell-content .btn-add-adjust{padding:2px 6px;font-size:10px;border-radius:4px;border:1px dashed var(--border);background:#fff;color:var(--primary);cursor:pointer;font-family:inherit}
.cell-content .btn-add-adjust:hover{background:var(--primary-light);border-color:var(--primary)}
.cell-content .btn-remove-adjust{padding:2px 6px;font-size:10px;border-radius:4px;border:1px solid var(--border);background:#fff;color:var(--danger);cursor:pointer;font-family:inherit}
.cell-content .btn-remove-adjust:hover{background:var(--danger-light)}

/* ===== 费用明细表 ===== */
.fee-summary{padding:16px}
.fee-summary .total-card{background:linear-gradient(135deg,var(--primary),#6366f1);color:#fff;border-radius:var(--radius);padding:20px;text-align:center;margin-bottom:16px}
.fee-summary .total-card .big-num{font-size:36px;font-weight:800}
.fee-summary .total-card .big-label{font-size:13px;opacity:.85;margin-top:4px}
.fee-table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:16px}
.fee-table th{background:#f8fafc;padding:8px 12px;text-align:left;font-weight:600;font-size:11px;color:var(--text-secondary);border-bottom:2px solid var(--border)}
.fee-table td{padding:8px 12px;border-bottom:1px solid #f1f5f9}
.fee-table .highlight-row{background:var(--primary-light);font-weight:600}

/* ===== 我的页面 ===== */
.mine-sections{display:flex;flex-direction:column;gap:12px}
.mine-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px}
.mine-card h4{font-size:14px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.semester-list{display:flex;flex-direction:column;gap:8px}
.semester-item{background:#f8fafc;border-radius:8px;padding:12px;cursor:pointer;transition:all .15s;border:1.5px solid transparent}
.semester-item:hover{background:var(--primary-light);border-color:var(--primary)}
.semester-item .sem-header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.semester-item .sem-name{font-weight:600;font-size:14px}
.semester-item .sem-fee{color:var(--primary);font-weight:700;font-size:15px}
.semester-item .sem-meta{font-size:12px;color:var(--text-secondary);margin-top:4px}
.semester-detail{display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.semester-detail.open{display:block}
.monthly-table{width:100%;border-collapse:collapse;font-size:12px}
.monthly-table th{background:#f1f5f9;padding:6px 8px;text-align:left;font-weight:600}
.monthly-table td{padding:6px 8px;border-bottom:1px solid #f1f5f9}
.lesson-detail-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px}
.lesson-detail-table th{background:#f8fafc;padding:6px 8px;text-align:left;font-weight:600;font-size:11px;color:var(--text-secondary);border-bottom:2px solid var(--border)}
.lesson-detail-table td{padding:6px 8px;border-bottom:1px solid #f1f5f9}
.student-stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}

/* ===== 登记表 ===== */
.register-section{padding:16px}
.register-header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.register-header h4{font-size:14px;font-weight:600}
.attendance-list{display:flex;flex-direction:column;gap:6px}
.attendance-row{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#fff;border:1px solid var(--border);border-radius:8px;flex-wrap:wrap}
.attendance-row .att-date{font-size:12px;color:var(--text-secondary);min-width:85px}
.attendance-row .att-content{flex:1;min-width:120px}
.attendance-row .att-content input{width:100%;padding:6px 8px;border:1px solid var(--border);border-radius:5px;font-size:12px;font-family:inherit}
.attendance-row .att-content input:focus{outline:none;border-color:var(--primary)}
.attendance-row .att-fee{min-width:60px;text-align:right;font-weight:600;color:var(--primary);font-size:12px}

/* ===== Toast ===== */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}

/* ===== 弹窗 ===== */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(15,23,42,.6);z-index:200;align-items:center;justify-content:center;padding:16px}
.modal-overlay.active{display:flex}
.modal{background:#fff;border-radius:12px;max-width:500px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 50px rgba(0,0,0,.2)}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:1}
.modal-header h3{font-size:16px}
.modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--text-secondary);padding:4px 8px;border-radius:6px}
.modal-close:hover{background:#f1f5f9}
.modal-body{padding:20px}
.modal-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;position:sticky;bottom:0;background:#fff}

/* ===== 调课弹窗 ===== */
.reschedule-form{display:flex;flex-direction:column;gap:12px}
.reschedule-form label{font-size:13px;font-weight:600;display:flex;flex-direction:column;gap:4px}
.reschedule-form .src-info{background:#f8fafc;padding:10px 14px;border-radius:8px;font-size:13px;color:var(--text-secondary);line-height:1.6}
.reschedule-form .collision-warn{display:none;background:var(--warning-light);border:1px solid #fbbf24;padding:10px 14px;border-radius:8px;font-size:13px;color:#92400e;line-height:1.6}
.reschedule-form .collision-warn .clash-item{font-weight:600;color:#d97706}
.reschedule-form .time-pair{display:flex;align-items:center;gap:8px}
.reschedule-form .date-hint{font-size:11px;color:var(--text-secondary);margin-top:-6px}

/* ===== 隐藏 ===== */
.hidden{display:none!important}
.tab-page{display:none}
.tab-page.active{display:block}
.step-page{display:none}
.step-page.active{display:block}

/* ===== 手机端适配 ===== */
@media (max-width:768px){
  .desktop-layout{grid-template-columns:1fr;padding:8px;gap:8px;padding-bottom:70px}
  .sidebar{display:none}
  .mobile-tabs{display:flex}
  .pc-tab-btn{display:none}
  .stats-row{grid-template-columns:repeat(2,1fr);gap:6px}
  .stat-card{padding:10px 12px}
  .stat-card .sc-value{font-size:18px}
  .topbar{padding:0 10px;height:44px}
  .topbar .logo{font-size:14px}
  .form-row{flex-direction:column;align-items:stretch}
  .form-row .form-input,
  .form-row .select-wrap{width:100%!important}
  .form-row.fee-row{flex-direction:row;align-items:center;flex-wrap:nowrap}
  .form-row.fee-row .form-input{width:90px!important}
  .form-row label{min-width:auto}
  .student-stats-row{grid-template-columns:repeat(2,1fr)}
  .month-table{font-size:11px}
  .month-table tbody td{height:65px;padding:2px;overflow:hidden}
  .month-table .day-num{font-size:11px}
  .month-table .day-date{font-size:8px}
  .cell-content .content-input,.cell-content .type-select{font-size:9px}
  .cell-content .lesson-time{font-size:7px;min-width:40px!important}
  .cell-content .status-label{font-size:7px;padding:0 2px}
  .cell-content .slot-row{gap:1px!important;margin-bottom:1px!important;flex-wrap:nowrap!important}
  .cell-content .slot-row button{font-size:7px!important;padding:0 2px!important}
  .fee-table{font-size:11px}
  .fee-table th{padding:6px 4px;font-size:10px;white-space:nowrap}
  .fee-table td{padding:6px 4px;font-size:11px;white-space:nowrap}
  .fee-summary{padding:10px}
  .fee-summary .total-card{padding:14px}
  .fee-summary .total-card .big-num{font-size:28px}
  .step-line{width:30px;margin:0 4px}
  .attendance-row{gap:4px;padding:6px 8px}
  .modal-overlay{padding:0}
  .modal{max-width:100%;max-height:100vh;border-radius:0}
}

@media (min-width:769px){.mobile-tabs{display:none}}

@media print{
  body{background:#fff}
  .topbar,.mobile-tabs,.modal-overlay,.sidebar,.steps-indicator{display:none!important}
  .print-area{display:block!important;padding:20px}
}

<script>
// ============================================================
// 数据模型 v4.2（修复调课日期偏移 + 平均课时费 + 排课按钮）
// lessons: { "YYYY-MM-DD": { time, type, content, fee, rescheduleTo, rescheduleFrom, attended, note } }
// type: 'normal' | 'adjust' | 'absent'
// ============================================================
const STORAGE_KEY = 'tuition_calc_v4_2';
let appData = { students: [], schedules: [] };
let currentTab = 'schedule';
let scheduleStep = 1;
let tempSchedule = null;
let selectedStudents = new Set();

// ===== 工具：本地日期字符串（避免 toISOString 时区偏移）=====
function toLocalDateStr(date) {
  if (!date || isNaN(date.getTime())) return '';
  const y = date.getFullYear();
  const m = String(date.getMonth()+1).padStart(2,'0');
  const d = String(date.getDate()).padStart(2,'0');
  return y+'-'+m+'-'+d;
}
// 从 YYYY-MM-DD 字符串创建本地午夜时间（避免 new Date('YYYY-MM-DD') 被当作 UTC）
function parseLocalDate(str) {
  if (!str) return null;
  const [y,m,d] = str.split('-').map(Number);
  return new Date(y, m-1, d);
}

// ===== 初始化 =====
(function init() {
  try {
    loadData();
    renderStudentList();
    initDates();
    initTempSchedule();
    renderStep1Students();
    updateScheduleSelects();
    switchTab('schedule');
    showToast('✅ 已加载 ' + appData.students.length + ' 名学生，' + appData.schedules.length + ' 条排课');
  } catch(e) {
    console.error('初始化错误:', e);
    document.body.innerHTML = '<div style="padding:40px;text-align:center;color:red"><h2>初始化失败</h2><p>'+e.message+'</p><p>请尝试清除浏览器数据后刷新</p></div>';
  }
})();

function initDates() {
  const now = new Date();
  const y = now.getFullYear(), m = now.getMonth();
  let semStart, semEnd, season;
  if (m >= 2 && m <= 5)       { semStart=y+'-02-15'; semEnd=y+'-06-30'; season='春季'; }
  else if (m >= 6 && m <= 7)  { semStart=y+'-07-01'; semEnd=y+'-08-31'; season='暑假'; }
  else if (m >= 8 && m <= 11) { semStart=y+'-09-01'; semEnd=y+'-12-31'; season='秋季'; }
  else                         { semStart=y+'-01-15'; semEnd=y+'-02-14'; season='寒假'; }
  document.getElementById('schedDateStart').value = semStart;
  document.getElementById('schedDateEnd').value = semEnd;
  document.getElementById('semesterYear').value = y;
  document.getElementById('semesterSeason').value = season;
}

// ===== 数据读写 =====
function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) { const p = JSON.parse(raw); if (p && Array.isArray(p.students)) { appData = p; } }
    else {
      for (const key of ['tuition_calc_v4_1','tuition_calc_v4']) {
        const old = localStorage.getItem(key);
        if (old) { const p = JSON.parse(old); if (p && Array.isArray(p.students)) { appData = p; break; } }
      }
    }
    if (!appData.schedules) appData.schedules = [];
    // ★ 旧数据兼容：补齐 slotStates（加 try 防数据异常导致整个页面崩溃）
    try {
      appData.schedules.forEach(sch => {
        if (sch.lessons) {
          Object.values(sch.lessons).forEach(l => ensureSlotStates(l, sch));
        }
      });
    } catch(e) { console.error('补齐 slotStates 出错:', e); }
  } catch(e) { appData = { students: [], schedules: [] }; }
}
// ★ 旧数据兼容：确保 lesson 有 slotStates 数组
function ensureSlotStates(lesson, sch) {
  const slotCount = (lesson.slots && lesson.slots.length) || (sch.timeSlots && sch.timeSlots.length) || 1;
  if (!lesson.slotStates || !Array.isArray(lesson.slotStates) || lesson.slotStates.length !== slotCount) {
    const newStates = [];
    for (let i = 0; i < slotCount; i++) {
      // 旧数据：整个 lesson 共享 type/content/rescheduleTo 等
      // 如果整个 lesson 是调出（有 rescheduleTo），所有时段都标记调出
      // 如果整个 lesson 是调入（有 rescheduleFrom），所有时段都标记调入
      // 否则按 type 来
      if (lesson.rescheduleTo && i === 0) {
        newStates.push({ type: 'adjust', rescheduleTo: lesson.rescheduleTo, teacherId: lesson.teacherId });
      } else if (lesson.rescheduleTo) {
        newStates.push({ type: 'adjust', rescheduleTo: lesson.rescheduleTo, teacherId: lesson.teacherId });
      } else if (lesson.rescheduleFrom && i === 0) {
        newStates.push({ type: 'adjust', rescheduleFrom: lesson.rescheduleFrom, teacherId: lesson.teacherId });
      } else if (lesson.rescheduleFrom) {
        newStates.push({ type: 'adjust', rescheduleFrom: lesson.rescheduleFrom, teacherId: lesson.teacherId });
      } else {
        newStates.push({ type: lesson.type || 'normal', content: i === 0 ? (lesson.content || '') : '' });
      }
    }
    lesson.slotStates = newStates;
  }
}

  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));
    const ind = document.getElementById('saveIndicator');
    if (ind) {

}

// ===== 生成月历（按时段独立渲染状态）=====
function generateCalendar() {
  try {
  const { dateStart, dateEnd, weekdays, timeSlots, feePerClass, semester, year } = tempSchedule;
  const slots = (timeSlots && timeSlots.length) ? timeSlots : [{start:'14:00',end:'16:00'}];

  const semStart = parseLocalDate(dateStart);
  const semEnd   = parseLocalDate(dateEnd);
  if (!semStart || !semEnd) {
    document.getElementById('calendarContainer').innerHTML = '<div style="padding:20px;color:var(--danger)">❌ 日期范围无效：开始='+dateStart+' 结束='+dateEnd+'</div>';
    return;
  }

  document.getElementById('calTitle').textContent = semester+'学期 '+year+' · '+dateStart+' 至 '+dateEnd;

  // 初始化/清理 lessons
  if (!tempSchedule.lessons) tempSchedule.lessons = {};
  const toDelete = [];
  for (const ds in tempSchedule.lessons) {
    if (ds < dateStart || ds > dateEnd) {
      const l = tempSchedule.lessons[ds];
      // 清理调出链（slotStates 版本）
      if (l.slotStates) {
        l.slotStates.forEach(ss => { if (ss && ss.rescheduleTo) toDelete.push(ss.rescheduleTo); });
      } else if (l.rescheduleTo) toDelete.push(l.rescheduleTo);
      if (!hasAnyRescheduleFrom(l)) toDelete.push(ds);
    }
  }
  [...new Set(toDelete)].forEach(ds=>delete tempSchedule.lessons[ds]);

  // 辅助：检查 lesson 是否有任何 slot 的 rescheduleFrom
  function hasAnyRescheduleFrom(l) {
    if (l.rescheduleFrom) return true;
    if (l.slotStates) return l.slotStates.some(ss => ss && (ss.rescheduleFrom || ss.type === 'makeup'));
    return false;
  }

  // 按日期范围生成计划课程
  for (let d = new Date(semStart); d <= semEnd; d.setDate(d.getDate()+1)) {
    const ds = toLocalDateStr(d);
    const dow = d.getDay();
    const wd = dow === 0 ? 7 : dow;
    if (weekdays.includes(wd) && !tempSchedule.lessons[ds]) {
      const timeStr = slots.map(s=>s.start+'-'+s.end).join(';');
      const totalFeeForDay = feePerClass * slots.length;
      const slotStates = slots.map(()=>({ type:'normal', content:'' }));
      tempSchedule.lessons[ds] = { time: timeStr, type:'normal', content:'', fee: totalFeeForDay, slots: slots.map(s=>({...s})), slotStates };
    }
  }

  const container = document.getElementById('calendarContainer');
  const weekNames = ['周一','周二','周三','周四','周五','周六','周日'];
  let html = '';

  let curMonth = new Date(semStart.getFullYear(), semStart.getMonth(), 1);
  const endMonth = new Date(semEnd.getFullYear(), semEnd.getMonth(), 1);

  while (curMonth <= endMonth) {
    const y = curMonth.getFullYear();
    const m = curMonth.getMonth();
    const daysInMonth = new Date(y, m+1, 0).getDate();
    const firstDow = new Date(y, m, 1).getDay();
    const firstOffset = firstDow === 0 ? 6 : firstDow - 1;

    let monthHtml = `<div class="month-block"><div class="month-title">📅 ${y}年${m+1}月</div>`;
    monthHtml += '<table class="month-table"><thead><tr>';
    weekNames.forEach((n,i)=> monthHtml += `<th class="${i>=5?'weekend':''}">${n}</th>`);
    monthHtml += '</tr></thead><tbody>';

    let cellCount = 0;
    let rowHtml = '<tr>';
    for (let i=0; i<firstOffset; i++) { rowHtml += '<td class="cell-empty"></td>'; cellCount++; }

    for (let day=1; day<=daysInMonth; day++) {
      const date = new Date(y, m, day);
      const ds = toLocalDateStr(date);
      const dow = date.getDay();
      const wd = dow === 0 ? 7 : dow;
      const inRange = date >= semStart && date <= semEnd;
      const isWeekdayMatch = inRange && weekdays.includes(wd);
      const lesson = tempSchedule.lessons[ds];

      // ★ 确保 lesson 有 slotStates
      if (lesson) ensureSlotStates(lesson, tempSchedule);

      let cellClass = '', cellContent = '';

      if (!inRange) {
        cellClass = 'cell-outrange';
        cellContent = `<div class="day-num">${day}</div><div class="day-date">${m+1}/${day}</div>`;
      } else {
        // ★ 按时段渲染，每个时段独立一行
        const hasSlotStates = lesson && lesson.slotStates && lesson.slotStates.length > 0;
        const isAllNormal = hasSlotStates && lesson.slotStates.every(ss => ss && ss.type === 'normal' && !ss.rescheduleTo && !ss.rescheduleFrom);
        const isAllAbsent = hasSlotStates && lesson.slotStates.every(ss => ss && ss.type === 'absent');
        const hasReschedule = hasSlotStates && lesson.slotStates.some(ss => ss && (ss.rescheduleTo || ss.rescheduleFrom));
        const hasAbsent = hasSlotStates && lesson.slotStates.some(ss => ss && ss.type === 'absent');
        const hasMakeup = hasSlotStates && lesson.slotStates.some(ss => ss && ss.type === 'makeup');
        // ★ 混合状态：各时段状态不一致
        const isMixed = hasSlotStates && !isAllNormal && !isAllAbsent;
        const isBlank = !lesson && !isWeekdayMatch;

        if (isBlank) {
          cellClass = 'cell-inrange';
          cellContent = `<div class="day-num">${day}</div><div class="day-date">${m+1}/${day}</div>`;
        } else if (isAllAbsent) {
          cellClass = 'cell-absent';
          cellContent = `<div class="day-num">${day}</div><div class="day-date">${m+1}/${day}</div><div class="cell-content"><span class="status-label">请假</span></div>`;
        } else if (isMixed && hasMakeup) {
          // ★ 补课日优先：用紫色高亮
          cellClass = 'cell-makeup';
          cellContent = `<div class="day-num">${day}</div><div class="day-date">${m+1}/${day}</div>`;
          cellContent += renderSlotRows(lesson, slots, ds, isWeekdayMatch);
        } else if (isMixed) {
          // ★ 混合状态：部分正常+部分请假/调课，用橙色标注
          cellClass = 'cell-mixed';
          cellContent = `<div class="day-num">${day}</div><div class="day-date">${m+1}/${day}</div>`;
          cellContent += renderSlotRows(lesson, slots, ds, isWeekdayMatch);
        } else if (isAllNormal && !hasReschedule && isWeekdayMatch) {
          cellClass = 'cell-scheduled';
          cellContent = `<div class="day-num">${day}</div><div class="day-date">${m+1}/${day}</div>`;
          cellContent += renderSlotRows(lesson, slots, ds, isWeekdayMatch);
        } else if (isAllNormal && !hasReschedule && !isWeekdayMatch) {
          // 调过来的课（全部时段调入）
          cellClass = 'cell-adjust';
          cellContent = `<div class="day-num">${day}</div><div class="day-date">${m+1}/${day}</div>`;
          cellContent += renderSlotRows(lesson, slots, ds, isWeekdayMatch);
        } else {
          cellClass = hasReschedule ? 'cell-adjust' : 'cell-inrange';
          cellContent = `<div class="day-num">${day}</div><div class="day-date">${m+1}/${day}</div>`;
          cellContent += renderSlotRows(lesson, slots, ds, isWeekdayMatch);
        }
      }

      rowHtml += `<td class="${cellClass}">${cellContent}</td>`;
      cellCount++;
      if (cellCount % 7 === 0) { rowHtml += '</tr>'; monthHtml += rowHtml; rowHtml = '<tr>'; }
    }
    while (cellCount % 7 !== 0) { rowHtml += '<td class="cell-empty"></td>'; cellCount++; }
    if (rowHtml !== '<tr>') { rowHtml += '</tr>'; monthHtml += rowHtml; }
    monthHtml += '</tbody></table></div>';
    html += monthHtml;
    curMonth.setMonth(curMonth.getMonth() + 1);
  }

  container.innerHTML = html;
  } catch(e) {
    console.error('generateCalendar error:', e);
    document.getElementById('calendarContainer').innerHTML = '<div style="padding:20px;color:var(--danger)">❌ 生成课表出错：'+e.message+'</div>';
  }
}

// ★ 渲染一个 lesson 的每个时段行
function renderSlotRows(lesson, slots, ds, isWeekdayMatch) {
  let html = '<div class="cell-content">';
  if (!lesson || !lesson.slotStates) {
    // 无 lesson，显示空白时段（仅课表日期）
    if (!isWeekdayMatch) { html += '</div>'; return html; }
    slots.forEach((s, i) => {
      const timeStr = s.start+'-'+s.end;
      html += `<div class="slot-row" style="display:flex;align-items:center;gap:3px;margin-bottom:2px;font-size:10px">
        <span class="lesson-time" style="font-size:10px;color:var(--text-secondary);white-space:nowrap">${timeStr}</span>
        <span style="color:#94a3b8">-</span>
      </div>`;
    });
    html += '</div>';
    return html;
  }

  const ssArr = lesson.slotStates;
  // ★ 遍历所有 slotStates（含超出的加课时段）
  const slotCount = Math.max(slots.length, ssArr.length);

  for (let i = 0; i < slotCount; i++) {
    const ss = (i < ssArr.length) ? ssArr[i] : undefined;
    // 非课表日期：只渲染有 slotState 的时段，跳过 undefined
    if (!isWeekdayMatch && !ss) continue;
    // 非课表日期：normal 类型但没有 rescheduleFrom/To 的时段不渲染
    if (!isWeekdayMatch && ss && ss.type === 'normal' && !ss.rescheduleFrom && !ss.rescheduleTo) continue;
    // ★ 时间段：优先使用 customSlot（加课自定义时间），否则用 slots[i]
    let timeStr;
    if (ss && ss.customSlot) {
      timeStr = ss.customSlot.start+'-'+ss.customSlot.end;
    } else if (i < slots.length && slots[i]) {
      timeStr = slots[i].start+'-'+slots[i].end;
    } else {
      timeStr = '-';
    }
    const type = ss ? (ss.type || 'normal') : 'normal';
    const isRescheduledAway = !!(ss && ss.rescheduleTo);
    const isRescheduledHere = !!(ss && ss.rescheduleFrom);
    // 状态标签
    let statusLabel = '';
    let statusColorStyle = ''; // 加课用粉色标签
    if (isRescheduledAway) statusLabel = '调课→'+ss.rescheduleTo.substring(5);
    else if (isRescheduledHere) statusLabel = '调入←'+ss.rescheduleFrom.substring(5);
    else if (type === 'absent') statusLabel = '请假';
    else if (type === 'makeup') { statusLabel = '加课'; statusColorStyle = 'background:#fce7f3;color:#9d174d'; }
    else statusLabel = '上课';

    html += `<div class="slot-row" style="display:flex;align-items:center;gap:3px;margin-bottom:2px;font-size:10px;flex-wrap:wrap">
      <span class="lesson-time" style="font-size:10px;color:var(--text-secondary);white-space:nowrap;min-width:55px">${timeStr}</span>
      <span class="status-label" style="font-size:9px;padding:0 4px;white-space:nowrap;${statusColorStyle}">${statusLabel}</span>`;

    // 操作按钮
    if (isRescheduledAway) {
      html += `<button class="btn-xs btn-outline" style="font-size:9px;padding:1px 4px" onclick="openRescheduleModal('${ds}',${i})">修改</button>
        <button class="btn-remove-adjust" style="font-size:9px;padding:1px 4px" onclick="cancelRescheduleFrom('${ds}',${i})">取消</button>`;
    } else if (isRescheduledHere) {
      html += `<button class="btn-xs btn-outline" style="font-size:9px;padding:1px 4px" onclick="openRescheduleModal('${ss.rescheduleFrom}',${i})">修改</button>
        <button class="btn-remove-adjust" style="font-size:9px;padding:1px 4px" onclick="cancelRescheduleTo('${ds}',${i})">取消</button>`;
    } else if (type === 'absent') {
      html += `<button class="btn-xs btn-outline" style="font-size:9px;padding:1px 4px;color:var(--success)" onclick="changeSlotState('${ds}',${i},'normal')">恢复</button>`;
    } else if (type === 'makeup') {
      html += `<button class="btn-xs btn-outline" style="font-size:9px;padding:1px 4px;color:var(--danger)" onclick="cancelMakeupSlot('${ds}',${i})">取消加课</button>`;
    } else {
      html += `<button class="btn-xs btn-outline" style="font-size:9px;padding:1px 4px;color:var(--danger)" onclick="changeSlotState('${ds}',${i},'absent')">请假</button>
        <button class="btn-xs btn-outline" style="font-size:9px;padding:1px 4px;color:var(--primary)" onclick="openRescheduleModal('${ds}',${i})">调课</button>`;
    }

    html += `</div>`;
  }
  html += '</div>';
  return html;
}
// ===== 调课逻辑 =====
let rescheduleSourceDate = null;
let rescheduleSourceSlotIdx = 0;

function changeSlotState(ds, slotIdx, newType) {
  if (!tempSchedule.lessons[ds]) return;
  ensureSlotStates(tempSchedule.lessons[ds], tempSchedule);
  const ss = tempSchedule.lessons[ds].slotStates;
  if (slotIdx >= ss.length) return;
  if (newType === 'absent') {
    ss[slotIdx] = { type: 'absent', content: '' };
  } else if (newType === 'normal') {
    ss[slotIdx] = { type: 'normal', content: (ss[slotIdx] && ss[slotIdx].content) || '' };
  }
  // ★ 同步更新费用
  recalcLessonFee(tempSchedule.lessons[ds], tempSchedule.feePerClass);
  generateCalendar();
}
function openRescheduleModal(ds, slotIdx) {
  rescheduleSourceDate = ds;
  rescheduleSourceSlotIdx = (slotIdx !== undefined) ? slotIdx : 0;
  const lesson = tempSchedule.lessons[ds];
  if (!lesson) return;
  ensureSlotStates(lesson, tempSchedule);
  const slots = (tempSchedule.timeSlots && tempSchedule.timeSlots.length) ? tempSchedule.timeSlots : [{start:'14:00',end:'16:00'}];
  const slot = slots[rescheduleSourceSlotIdx] || slots[0];
  const ss = (lesson.slotStates && lesson.slotStates[rescheduleSourceSlotIdx]) ? lesson.slotStates[rescheduleSourceSlotIdx] : { type:'normal', content:'' };
  
  document.getElementById('rescheduleSrcInfo').innerHTML = '📅 原上课日期：<strong>'+ds+'</strong> · ⏰ '+slot.start+'-'+slot.end+' (时段'+(rescheduleSourceSlotIdx+1)+')';
  document.getElementById('rescheduleTimeStart').value = slot.start;
  document.getElementById('rescheduleTimeEnd').value   = slot.end;
  document.getElementById('rescheduleContent').value   = ss.content || '';
  document.getElementById('rescheduleTargetDate').value = ss.rescheduleTo || '';
  
  const teacherSelect = document.getElementById('rescheduleTeacher');
  const scheduleStudentIds = tempSchedule.studentIds || [];
  teacherSelect.innerHTML = scheduleStudentIds.map(sid => {
    const name = getStudentName(sid);
    const selected = (ss.teacherId === sid) ? ' selected' : '';
    return `<option value="${sid}"${selected}>${escHtml(name)}</option>`;
  }).join('');
  if (!ss.teacherId && scheduleStudentIds.length > 0) {
    teacherSelect.value = scheduleStudentIds[0];
  }
  document.getElementById('collisionWarn').style.display = 'none';
  document.getElementById('rescheduleModal').classList.add('active');
}
function closeRescheduleModal() {
  document.getElementById('rescheduleModal').classList.remove('active');
  rescheduleSourceDate = null;
  rescheduleSourceSlotIdx = 0;
}

function checkCollisionLive() {
  const targetDate = document.getElementById('rescheduleTargetDate').value;
  const tS = document.getElementById('rescheduleTimeStart').value;
  const tE = document.getElementById('rescheduleTimeEnd').value;
  if (!targetDate || !tS || !tE || tS >= tE) { document.getElementById('collisionWarn').style.display='none'; return; }
  const collision = checkLessonCollision(rescheduleSourceDate, targetDate, tS+'-'+tE);
  if (collision) {
    document.getElementById('collisionMsg').innerHTML = collision;
    document.getElementById('collisionWarn').style.display = 'block';
  } else {
    document.getElementById('collisionWarn').style.display = 'none';
  }
}

function confirmReschedule() {
  const targetDate = document.getElementById('rescheduleTargetDate').value;
  const tS = document.getElementById('rescheduleTimeStart').value;
  const tE = document.getElementById('rescheduleTimeEnd').value;
  const content = document.getElementById('rescheduleContent').value.trim();
  const teacherId = document.getElementById('rescheduleTeacher').value;
  const slotIdx = rescheduleSourceSlotIdx;
  if (!targetDate) { showToast('请选择调课日期'); return; }
  if (!tS || !tE)  { showToast('请设置时间段'); return; }
  if (tS >= tE)    { showToast('结束时间必须晚于开始时间'); return; }
  if (targetDate === rescheduleSourceDate) { showToast('调课日期不能和原日期相同'); return; }
  const timeStr = tS+'-'+tE;
  const collision = checkLessonCollision(rescheduleSourceDate, targetDate, timeStr);
  if (collision) {
    document.getElementById('collisionMsg').innerHTML = collision;
    document.getElementById('collisionWarn').style.display = 'block';
    return;
  }
  const srcLesson = tempSchedule.lessons[rescheduleSourceDate];
  if (!srcLesson) return;
  ensureSlotStates(srcLesson, tempSchedule);
  const feePerSlot = tempSchedule.feePerClass;
  
  // 源课：标记该时段为调出
  if (srcLesson.slotStates[slotIdx].rescheduleTo) {
    delete tempSchedule.lessons[srcLesson.slotStates[slotIdx].rescheduleTo];
  }
  srcLesson.slotStates[slotIdx] = { type:'adjust', rescheduleTo:targetDate, teacherId, content: srcLesson.slotStates[slotIdx].content || '' };
  
  // 目标日期：只创建/更新被调课的时段，不初始化全部时段
  if (!tempSchedule.lessons[targetDate]) {
    const slots = (tempSchedule.timeSlots && tempSchedule.timeSlots.length) ? tempSchedule.timeSlots : [{start:'14:00',end:'16:00'}];
    // 只初始化被调课的那个 slot，其余保持 undefined（渲染时会跳过）
    const slotStates = new Array(slots.length);
    slotStates[slotIdx] = { type:'adjust', rescheduleFrom:rescheduleSourceDate, content, teacherId };
    const timeAll = slots.map(s=>s.start+'-'+s.end).join(';');
    tempSchedule.lessons[targetDate] = { time: timeAll, type:'normal', content:'', fee: 0, slots: slots.map(s=>({...s})), slotStates };
  } else {
    // 已有 lesson，只更新对应 slotIdx
    ensureSlotStates(tempSchedule.lessons[targetDate], tempSchedule);
    // 清理目标时段已有的调课
    const tgtSs = tempSchedule.lessons[targetDate].slotStates[slotIdx];
    if (tgtSs && tgtSs.rescheduleFrom) {
      const origSrcDate = tgtSs.rescheduleFrom;
      if (tempSchedule.lessons[origSrcDate] && tempSchedule.lessons[origSrcDate].slotStates) {
        const origSs = tempSchedule.lessons[origSrcDate].slotStates[slotIdx];
        if (origSs) { origSs.type = 'normal'; delete origSs.rescheduleTo; delete origSs.teacherId; }
      }
    }
    tempSchedule.lessons[targetDate].slotStates[slotIdx] = { type:'adjust', rescheduleFrom:rescheduleSourceDate, content, teacherId };
  }
  // 更新费用
  recalcLessonFee(tempSchedule.lessons[targetDate], tempSchedule.feePerClass);
  recalcLessonFee(srcLesson, tempSchedule.feePerClass);
  
  closeRescheduleModal();
  generateCalendar();
  showToast('✅ 调课已设置：'+rescheduleSourceDate+' 时段'+(slotIdx+1)+' → '+targetDate);
}

// ===== 加课逻辑 =====

  document.getElementById('makeupDate').min = tempSchedule.dateStart;
  document.getElementById('makeupDate').max = '2030-12-31';

  // 初始化时间段（默认取课表第一个时段，没有则默认14-16）
  const slots = (tempSchedule.timeSlots && tempSchedule.timeSlots.length) ? tempSchedule.timeSlots : [{start:'14:00',end:'16:00'}];
  document.getElementById('makeupTimeStart').value = slots[0].start;
  document.getElementById('makeupTimeEnd').value = slots[0].end;

  // 填充老师选择
  const teacherOptions = tempSchedule.studentIds.map(sid =>
    `<option value="${sid}">${escHtml(getStudentName(sid))}</option>`
  ).join('');

function closeMakeupModal() {
  document.getElementById('makeupModal').style.display = 'none';
}

function confirmMakeup() {
  const targetDate = document.getElementById('makeupDate').value;
  const timeStart = document.getElementById('makeupTimeStart').value;
  const timeEnd = document.getElementById('makeupTimeEnd').value;
  const teacherId = document.getElementById('makeupTeacher').value;
  const note = document.getElementById('makeupNote').value.trim();

  if (!targetDate) { showToast('请选择加课日期'); return; }
  if (!timeStart || !timeEnd) { showToast('请选择时间段'); return; }
  if (timeStart >= timeEnd) { showToast('结束时间必须晚于开始时间'); return; }

  const customSlot = { start: timeStart, end: timeEnd };

  // 确保目标日期有 lesson
  if (!tempSchedule.lessons[targetDate]) {
    const slotStates = [{ type: 'makeup', content: note, teacherId, customSlot }];
    tempSchedule.lessons[targetDate] = { time: timeStart+'-'+timeEnd, type:'normal', content:'', fee: 0, slots: [{...customSlot}], slotStates };
  } else {
    const lesson = tempSchedule.lessons[targetDate];
    ensureSlotStates(lesson, tempSchedule);
    // 推入新的加课时段
    lesson.slotStates.push({ type: 'makeup', content: note, teacherId, customSlot });
    // 同步 slots 数组（用于日历渲染）
    if (!lesson.slots) lesson.slots = [];
    lesson.slots.push({...customSlot});
  }

  recalcLessonFee(tempSchedule.lessons[targetDate], tempSchedule.feePerClass);
  closeMakeupModal();
  generateCalendar();
  showToast('✅ 加课已设置：'+targetDate+' '+timeStart+'-'+timeEnd);
}

function cancelMakeupSlot(ds, slotIdx) {
  const lesson = tempSchedule.lessons[ds];
  if (!lesson) return;
  ensureSlotStates(lesson, tempSchedule);
  const ss = lesson.slotStates[slotIdx];
  if (!ss || ss.type !== 'makeup') return;
  const isCustom = !!ss.customSlot;
  // 如果该日期是课表日期且 slotIdx 在课表时段范围内，恢复为 normal；否则清除该 slot
  const date = parseLocalDate(ds);
  const dow = date.getDay(); const wd = dow===0?7:dow;
  if (tempSchedule.weekdays.includes(wd) && slotIdx < (tempSchedule.timeSlots || []).length) {
    lesson.slotStates[slotIdx] = { type: 'normal', content: '' };
  } else {
    lesson.slotStates[slotIdx] = undefined;
    // 同步清理 slots 数组中的对应自定义 slot
    if (isCustom && lesson.slots && slotIdx < lesson.slots.length) {
      lesson.slots[slotIdx] = undefined;
    }
    // 检查是否所有时段都空了
    const allEmpty = lesson.slotStates.every(s => !s || (s && s.type === 'normal' && !s.rescheduleFrom && !s.rescheduleTo && !s.content));
    if (allEmpty) delete tempSchedule.lessons[ds];
  }
  recalcLessonFee(lesson, tempSchedule.feePerClass);
  generateCalendar();
  showToast('已取消加课');
}

// ★ 重新计算 lesson 的总费用
function recalcLessonFee(lesson, feePerClass) {
  if (!lesson.slotStates) return;
  let totalFee = 0;
  lesson.slotStates.forEach((ss, i) => {
    if (!ss) return; // 跳过 undefined（非课表日期的未定义时段）
    if (ss.type === 'absent') return; // 请假不计费
    if (ss.rescheduleTo) return; // 调出不计费（已在目标日期计）
    // normal 或 adjust（调入）都计费
    totalFee += feePerClass;
  });
  lesson.fee = totalFee;
}

function cancelRescheduleFrom(ds, slotIdx) {
  const lesson = tempSchedule.lessons[ds];
  if (!lesson) return;
  ensureSlotStates(lesson, tempSchedule);
  const ss = lesson.slotStates[slotIdx];
  if (!ss || !ss.rescheduleTo) return;
  // 删除目标日期的对应时段
  const targetDate = ss.rescheduleTo;
  const targetLesson = tempSchedule.lessons[targetDate];
  if (targetLesson) {
    ensureSlotStates(targetLesson, tempSchedule);
    if (targetLesson.slotStates[slotIdx]) {
      targetLesson.slotStates[slotIdx] = undefined; // 只清除该时段，不设为 normal
      // 如果目标日期所有时段都是 undefined/null，删除整个 lesson
      const allEmpty = targetLesson.slotStates.every(s => !s || (s.type === 'normal' && !s.rescheduleFrom && !s.rescheduleTo && !s.content));
      if (allEmpty) {
        delete tempSchedule.lessons[targetDate];
      } else {
        recalcLessonFee(targetLesson, tempSchedule.feePerClass);
      }
    }
  }
  ss.type = 'normal'; delete ss.rescheduleTo; delete ss.teacherId;
  recalcLessonFee(lesson, tempSchedule.feePerClass);
  generateCalendar(); showToast('已取消调课，恢复为上课');
}
function cancelRescheduleTo(ds, slotIdx) {
  const lesson = tempSchedule.lessons[ds];
  if (!lesson) return;
  ensureSlotStates(lesson, tempSchedule);
  const ss = lesson.slotStates[slotIdx];
  if (!ss || !ss.rescheduleFrom) return;
  const srcDate = ss.rescheduleFrom;
  const srcLesson = tempSchedule.lessons[srcDate];
  if (srcLesson && srcLesson.slotStates) {
    const srcSs = srcLesson.slotStates[slotIdx];
    if (srcSs) { srcSs.type = 'normal'; delete srcSs.rescheduleTo; delete srcSs.teacherId; }
    recalcLessonFee(srcLesson, tempSchedule.feePerClass);
  }
  // 清理目标日期该时段（设为 undefined，不是 normal）
  lesson.slotStates[slotIdx] = undefined;
  // 如果目标日期所有时段都是 undefined/null，删除整个 lesson
  const allEmpty = lesson.slotStates.every(s => !s || (s.type === 'normal' && !s.rescheduleFrom && !s.rescheduleTo && !s.content));
  if (allEmpty) {
    delete tempSchedule.lessons[ds];
  } else {
    recalcLessonFee(lesson, tempSchedule.feePerClass);
  }
  generateCalendar(); showToast('已取消调课');
}

function timeOverlap(t1, t2) {
  const toMin = t => { const [h,m]=t.split(':').map(Number); return h*60+m; };
  const [a1,a2] = t1.split('-').map(toMin);
  const [b1,b2] = t2.split('-').map(toMin);
  return a1 < b2 && b1 < a2;
}

function checkLessonCollision(sourceDateStr, targetDateStr, timeStr) {
  const clashStudents = [];
  for (const sch of appData.schedules) {
    if (!sch.lessons) continue;
    if (tempSchedule.id && sch.id === tempSchedule.id) continue;
    const l = sch.lessons[targetDateStr];
    if (!l || l.type==='absent') continue;
    const defaultSchTime = (sch.timeSlots&&sch.timeSlots.length) ? sch.timeSlots.map(s=>s.start+'-'+s.end).join(';') : (sch.timeStart||'14:00')+'-'+(sch.timeEnd||'16:00');
    const lt = l.time || defaultSchTime;
    if (timeOverlap(timeStr, lt)) clashStudents.push(...sch.studentIds.map(id=>getStudentName(id)));
  }
  if (tempSchedule.lessons) {
    for (const [ds, l] of Object.entries(tempSchedule.lessons)) {
      if (ds === targetDateStr && ds !== sourceDateStr && l.type !== 'absent') {
        const defaultTsTime = (tempSchedule.timeSlots&&tempSchedule.timeSlots.length) ? tempSchedule.timeSlots.map(s=>s.start+'-'+s.end).join(';') : '14:00-16:00';
        const lt = l.time || defaultTsTime;
        if (timeOverlap(timeStr, lt)) clashStudents.push(...tempSchedule.studentIds.map(id=>getStudentName(id)));
      }
      if (l.rescheduleTo === targetDateStr && ds !== sourceDateStr) {
        const defaultTsTime2 = (tempSchedule.timeSlots&&tempSchedule.timeSlots.length) ? tempSchedule.timeSlots.map(s=>s.start+'-'+s.end).join(';') : '14:00-16:00';
        const lt = defaultTsTime2;
        if (timeOverlap(timeStr, lt)) clashStudents.push(...tempSchedule.studentIds.map(id=>getStudentName(id)));
      }
    }
  }
  const unique = [...new Set(clashStudents)];
  if (unique.length) return '和 <span class="clash-item">'+unique.map(n=>escHtml(n)).join('、')+'</span> 同学撞课了！请修改日期或时间段。';
  return null;
}

function updateLessonContent(ds, content) {
  // ★ 按时段：更新所有 slot 的 content
  if (tempSchedule.lessons[ds]) {
    const l = tempSchedule.lessons[ds];
    l.content = content;
    ensureSlotStates(l, tempSchedule);
    if (l.slotStates) l.slotStates.forEach(ss => { if (ss) ss.content = content; });
  }
}
function removeAdjustLesson(ds) { delete tempSchedule.lessons[ds]; generateCalendar(); }

function resetAllToNormal() {
  if (!confirm('确定将所有请假和调课恢复为正常上课？')) return;
  for (const k in tempSchedule.lessons) {
    const l = tempSchedule.lessons[k];
    ensureSlotStates(l, tempSchedule);
    // 清理调课目标
    if (l.slotStates) {
      l.slotStates.forEach(ss => {
        if (ss && ss.rescheduleFrom) {
          // 这是调课目标日期，清理掉
          l.slotStates.forEach(s => { if (s) { s.type = 'normal'; delete s.rescheduleFrom; delete s.rescheduleTo; delete s.teacherId; } });
        }
      });
    }
  }
  // 清理所有 slotStates
  for (const k in tempSchedule.lessons) {
    const l = tempSchedule.lessons[k];
    ensureSlotStates(l, tempSchedule);
    if (l.slotStates) {
      l.slotStates.forEach(ss => {
        if (ss && (ss.type === 'absent' || ss.type === 'adjust' || ss.type === 'makeup')) { ss.type = 'normal'; delete ss.rescheduleTo; delete ss.rescheduleFrom; delete ss.teacherId; }
      });
    }
    // 删除非计划日的 lesson
    const date = parseLocalDate(k);
    const dow = date.getDay(); const wd = dow===0?7:dow;
    const hasContent = l.slotStates && l.slotStates.some(ss => ss && (ss.rescheduleFrom || ss.type === 'makeup'));
    if (!tempSchedule.weekdays.includes(wd) && !hasContent) delete tempSchedule.lessons[k];
  }
  generateCalendar(); showToast('已全部恢复为正常上课');
}
function clearAllAdjust() {
  if (!confirm('确定清空所有调课？')) return;
  for (const k in tempSchedule.lessons) {
    const l = tempSchedule.lessons[k];

        }
      });

  for (const k in tempSchedule.lessons) {
    const l = tempSchedule.lessons[k];
    ensureSlotStates(l, tempSchedule);

        if (ss && ss.rescheduleTo) { ss.type = 'normal'; delete ss.rescheduleTo; delete ss.teacherId; }
      });
    }
    const date = parseLocalDate(k);
    const dow = date.getDay(); const wd = dow===0?7:dow;
    const hasContent = l.slotStates && l.slotStates.some(ss => ss && (ss.rescheduleFrom || ss.type === 'makeup'));
    if (!tempSchedule.weekdays.includes(wd) && !hasContent) delete tempSchedule.lessons[k];
  }
  generateCalendar(); showToast('已清空调课');
}

// ===== 费用计算（fee 已按多时段在生成时计入，直接使用）=====
function calcScheduleStats(sch) {
  let totalLessons=0, totalFee=0, totalAbsent=0;
  let totalNormalSlots=0, totalAdjustSlots=0, totalMakeupSlots=0;
  const monthly = {};
  const absentList = []; // ★ 请假列表
  if (sch.lessons) {
    for (const [ds, l] of Object.entries(sch.lessons)) {
      // ★ 按时段统计
      ensureSlotStates(l, sch);
      if (l.slotStates) {
        l.slotStates.forEach((ss, i) => {
          if (!ss) return; // 跳过 undefined
          if (ss.type === 'absent') { totalAbsent++; absentList.push(ds+' 时段'+(i+1)); return; }
          if (ss.rescheduleTo) return; // 调出不计
          // normal 或 adjust（调入）都计费
          totalLessons++;
          totalFee += sch.feePerClass;
          if (ss.rescheduleFrom) totalAdjustSlots++;
          else if (ss.type === 'makeup') totalMakeupSlots++;
          else totalNormalSlots++;
          const mk = ds.substring(0,7);
          if (!monthly[mk]) monthly[mk] = { lessons:0, fee:0 };
          monthly[mk].lessons++;
          monthly[mk].fee += sch.feePerClass;
        });
      } else {
        // 旧数据兼容（无 slotStates）
        if (l.type === 'absent') { totalAbsent++; absentList.push(ds); continue; }
        if (l.rescheduleTo) continue;
        const fee = (l.fee!=null && l.fee!=='') ? Number(l.fee) : sch.feePerClass;
        totalLessons++; totalFee += fee;
        totalNormalSlots++;
        const mk = ds.substring(0,7);
        if (!monthly[mk]) monthly[mk] = { lessons:0, fee:0 };
        monthly[mk].lessons++; monthly[mk].fee += fee;
      }
    }
  }
  const avgFeePerLesson = totalLessons > 0 ? (totalFee / totalLessons) : sch.feePerClass;
  return { totalLessons, totalFee, totalAbsent, totalNormalSlots, totalAdjustSlots, totalMakeupSlots, absentList, monthly, avgFeePerLesson };
}

function renderFeeSummary() {
  const container = document.getElementById('feeSummary');
  const { semester, year, feePerClass, studentIds } = tempSchedule;
  const stats = calcScheduleStats(tempSchedule);
  const { totalLessons, totalFee, totalAbsent, totalNormalSlots, totalAdjustSlots, totalMakeupSlots, absentList, monthly, avgFeePerLesson } = stats;

  const sortedMonths = Object.keys(monthly).sort();
  const monthCount = sortedMonths.length;
  const avgPerMonth = monthCount > 0 ? (totalFee / monthCount).toFixed(0) : 0;

  let monthRows = sortedMonths.map(mk=>{
    const s = monthly[mk];
    return `<tr><td>${mk}</td><td>${s.lessons}节</td><td style="text-align:right;font-weight:600">¥${s.fee.toFixed(0)}</td></tr>`;
  }).join('');

  const weekNames = ['日','一','二','三','四','五','六'];
  let detailRows = [];
  if (tempSchedule.lessons) {
    const slots = (tempSchedule.timeSlots && tempSchedule.timeSlots.length) ? tempSchedule.timeSlots : [{start:'14:00',end:'16:00'}];
    for (const [ds, l] of Object.entries(tempSchedule.lessons)) {
      ensureSlotStates(l, tempSchedule);
      const d = parseLocalDate(ds);
      if (l.slotStates) {
        l.slotStates.forEach((ss, i) => {
          if (!ss) return;
          if (ss.type === 'absent') {
            const timeS = (ss.customSlot) ? ss.customSlot.start+'-'+ss.customSlot.end : ((slots[i]||slots[0]).start+'-'+(slots[i]||slots[0]).end);
            detailRows.push({ date:ds, week:'周'+weekNames[d.getDay()], time:timeS, content:'请假', fee:0, isAbsent:true, isAdjust:false, isMakeup:false });
            return;
          }
          if (ss.rescheduleTo) return;
          // ★ 时间段：优先用 customSlot，否则用课表 slots[i]
          let timeStr;
          if (ss.customSlot) {
            timeStr = ss.customSlot.start+'-'+ss.customSlot.end;
          } else if (slots[i]) {
            timeStr = slots[i].start+'-'+slots[i].end;
          } else {
            timeStr = '-';
          }
          const isAdj = ss.type === 'adjust' || !!ss.rescheduleFrom;
          const isMakeup = ss.type === 'makeup';
          detailRows.push({ date:ds, week:'周'+weekNames[d.getDay()], time:timeStr, content:ss.content||'-', fee:feePerClass, isAbsent:false, isAdjust:isAdj, isMakeup });
        });
      } else {
        // 旧数据兼容
        if (l.type==='absent') {
          detailRows.push({ date:ds, week:'周'+weekNames[d.getDay()], time:l.time||'', content:'请假', fee:0, isAbsent:true, isAdjust:false });
          return;
        }
        if (l.rescheduleTo) return;
        const fee = (l.fee!=null && l.fee!=='') ? Number(l.fee) : feePerClass;
        const isAdj = l.type === 'adjust' || !!l.rescheduleFrom;
        detailRows.push({ date:ds, week:'周'+weekNames[d.getDay()], time:l.time, content:l.content||'-', fee, isAbsent:false, isAdjust:isAdj });
      }
    }
  }
  detailRows.sort((a,b)=>a.date.localeCompare(b.date));
  const detailHtml = detailRows.map(r=>{
    if (r.isAbsent) {
      return `<tr style="background:#fef2f2;text-decoration:line-through;color:#dc2626"><td>${r.date}</td><td>${r.week}</td><td>${r.time}</td><td>🚫 请假</td><td style="text-align:right">-</td></tr>`;
    }
    const isAdj = r.isAdjust;
    const isMakeup = r.isMakeup;
    let rowStyle = '';
    let tagHtml = '';
    if (isMakeup) {
      rowStyle = ' style="background:#fdf2f8"';
      tagHtml = ' <span style="font-size:10px;background:#fce7f3;color:#9d174d;padding:1px 5px;border-radius:4px">加课</span>';
    } else if (isAdj) {
      rowStyle = ' style="background:#dbeafe"';
      tagHtml = ' <span style="font-size:10px;background:#bfdbfe;color:#1e40af;padding:1px 5px;border-radius:4px">调课</span>';
    }
    return `<tr${rowStyle}>
    <td>${r.date}</td><td>${r.week}</td><td>${r.time}</td>
    <td>${escHtml(r.content)}${tagHtml}</td>
    <td style="text-align:right">¥${r.fee}</td>
  </tr>`}).join('');

  // ★ 请假备注
  let absentNote = '';
  if (totalAbsent > 0) {
    absentNote = `<div class="form-section" style="background:var(--danger-light);border-color:#fecaca;margin-top:12px">
      <h4 style="color:var(--danger)">🚫 请假备注</h4>
      <p style="font-size:12px;color:#991b1b">共请假 <strong>${totalAbsent}</strong> 个时段，不计入费用。</p>
    </div>`;
  }

  container.innerHTML = `
    <div class="total-card">
      <div class="big-label">${semester}学期 ${year} · 总学费</div>
      <div class="big-num">¥${totalFee.toFixed(0)}</div>
      <div style="font-size:13px;opacity:.85;margin-top:4px">${totalLessons}节课${totalAdjustSlots>0?'（含调课'+totalAdjustSlots+'节）':''}${totalMakeupSlots>0?'（含加课'+totalMakeupSlots+'节）':''} · 请假${totalAbsent}节 · ${studentIds.length}名学生</div>
    </div>
    <div class="stats-row" style="margin-bottom:16px">
      <div class="stat-card"><div class="sc-label">📖 上课节数</div><div class="sc-value">${totalLessons}</div></div>
      <div class="stat-card"><div class="sc-label">🚫 请假节数</div><div class="sc-value">${totalAbsent}</div></div>
      <div class="stat-card"><div class="sc-label">📊 月均费用</div><div class="sc-value">¥${avgPerMonth}</div></div>
      <div class="stat-card highlight"><div class="sc-label">🏷 平均课时费</div><div class="sc-value">¥${avgFeePerLesson.toFixed(0)}</div></div>
    </div>
    <h4 style="font-size:13px;font-weight:600;margin-bottom:8px">📅 月度明细</h4>
    <table class="fee-table">
      <thead><tr><th>月份</th><th>节数</th><th style="text-align:right">费用</th></tr></thead>
      <tbody>${monthRows}
        <tr class="highlight-row"><td><strong>合计</strong></td><td><strong>${totalLessons}节</strong></td><td style="text-align:right"><strong style="color:var(--primary);font-size:15px">¥${totalFee.toFixed(0)}</strong></td></tr>
      </tbody>
    </table>
    <h4 style="font-size:13px;font-weight:600;margin-bottom:8px">📋 上课明细</h4>
    <table class="fee-table">
      <thead><tr><th>日期</th><th>星期</th><th>时间</th><th>课程内容</th><th style="text-align:right">费用</th></tr></thead>
      <tbody>${detailHtml}
        <tr class="highlight-row"><td colspan="4"><strong>合计</strong></td><td style="text-align:right"><strong style="color:var(--primary)">¥${totalFee.toFixed(0)}</strong></td></tr>
      </tbody>
    </table>
    ${absentNote}
    <h4 style="font-size:13px;font-weight:600;margin-bottom:8px">👥 学生明细</h4>
    <table class="fee-table">
      <thead><tr><th>学生</th><th>默认课时费/节</th><th>总节数</th><th style="text-align:right">应缴费用</th></tr></thead>
      <tbody>${studentIds.map(sid=>`
        <tr><td>👤 ${escHtml(getStudentName(sid))}</td><td>¥${feePerClass}</td><td>${totalLessons}节</td>
        <td style="text-align:right;font-weight:600;color:var(--primary)">¥${totalFee.toFixed(0)}</td></tr>`).join('')}
      </tbody>
    </table>`;
}

function saveSchedule() {
  gatherStep1Data();
  const scheduleData = {
    id: tempSchedule.id || 'sch_'+Date.now(),
    semester:tempSchedule.semester, year:tempSchedule.year,
    dateStart:tempSchedule.dateStart, dateEnd:tempSchedule.dateEnd,
    feePerClass:tempSchedule.feePerClass,
    weekdays:tempSchedule.weekdays,
    timeSlots:tempSchedule.timeSlots,
    studentIds:tempSchedule.studentIds,
    lessons:JSON.parse(JSON.stringify(tempSchedule.lessons)),
    createdAt:new Date().toISOString()
  };
  const idx = appData.schedules.findIndex(s=>s.id===scheduleData.id);
  if (idx>=0) appData.schedules[idx] = scheduleData;
  else appData.schedules.push(scheduleData);
  saveData(); updateScheduleSelects(); renderStudentList();
  showToast('✅ 排课已保存！');
  initTempSchedule(); initDates(); renderStep1Students(); showStep(1);
}

  // ★ 按时段过滤：只显示有正常课或调课的日期

    const l = sch.lessons[k];
    ensureSlotStates(l, sch);
    if (l.slotStates) {
      return l.slotStates.some(ss => ss && ss.type !== 'absent' && !ss.rescheduleTo);
    }

  }).sort();
  if (!allDates.length) { container.innerHTML = '<p style="text-align:center;color:#94a3b8;padding:40px">该学期暂无课程安排</p>'; return; }
  const weekNames = ['日','一','二','三','四','五','六'];
  const slots = (sch.timeSlots && sch.timeSlots.length) ? sch.timeSlots : [{start:'14:00',end:'16:00'}];
  let html = '<div class="attendance-list">';
  allDates.forEach(ds=>{
    const d = parseLocalDate(ds);
    const l = sch.lessons[ds];
    ensureSlotStates(l, sch);
    const feeDisplay = sch.feePerClass;
    const status = l.attended ? '✅' : '⭕';
    // ★ 按时段显示
    const timeDisplay = l.slotStates ? l.slotStates.filter(ss => ss).map((ss, i) => {
      if (ss.customSlot) return ss.customSlot.start+'-'+ss.customSlot.end;
      const slot = slots[i] || slots[0];
      return slot.start+'-'+slot.end;
    }).join(', ') : (l.time || '');
    html += `<div class="attendance-row" style="${l.attended?'background:#f0fdf4':''}">
      <span class="att-date">${(d.getMonth()+1)+'/'+d.getDate()} 周${weekNames[d.getDay()]}</span>
      <span style="font-size:10px;color:var(--text-secondary)">${timeDisplay}</span>
      <span class="att-content"><input value="${escAttr(l.note||l.content||'')}" placeholder="上课内容…" onchange="updateLessonNote('${schId}','${ds}',this.value)"></span>

    </div>`;
  });
  html += '</div>';
  container.innerHTML = html;
}
function toggleLessonAttended(schId, dateKey) {
  const sch = appData.schedules.find(s=>s.id===schId);
  if (!sch||!sch.lessons[dateKey]) return;
  sch.lessons[dateKey].attended = !sch.lessons[dateKey].attended;
  saveData(); renderRegister();
}
function updateLessonNote(schId, dateKey, value) {
  const sch = appData.schedules.find(s=>s.id===schId);
  if (!sch||!sch.lessons[dateKey]) return;
  sch.lessons[dateKey].note = value;
  sch.lessons[dateKey].content = value;
  saveData();
}

// ===== 老师日程表 =====
let svSelectedStudents = new Set();

function openScheduleView() {
  // 收集所有排课日期范围
  let minDate = '', maxDate = '';
  appData.schedules.forEach(sch => {
    if (sch.dateStart && (!minDate || sch.dateStart < minDate)) minDate = sch.dateStart;
    if (sch.dateEnd && (!maxDate || sch.dateEnd > maxDate)) maxDate = sch.dateEnd;
  });
  
  // 渲染学生选择标签
  svSelectedStudents.clear();
  const allStudents = appData.students.filter(s => {
    return appData.schedules.some(sch => sch.studentIds.includes(s.id));
  });
  if (allStudents.length > 0) {
    allStudents.forEach(s => svSelectedStudents.add(s.id));
  }
  
  const tagsHtml = allStudents.length > 0 ? allStudents.map(s => {
    const sel = svSelectedStudents.has(s.id) ? ' selected' : '';
    return `<span class="student-tag${sel}" id="svTag_${s.id}" onclick="toggleSVStudent('${s.id}')">${escHtml(s.name)}</span>`;
  }).join('') : '<span style="color:#94a3b8;font-size:13px">暂无已排课的学生</span>';
  
  document.getElementById('svStudentTags').innerHTML = tagsHtml;
  document.getElementById('svDateStart').value = minDate;
  document.getElementById('svDateEnd').value = maxDate;
  document.getElementById('svStep1').style.display = 'block';
  document.getElementById('svStep2').style.display = 'none';
  document.getElementById('scheduleViewModal').style.display = 'flex';
}

function toggleSVStudent(sid) {
  if (svSelectedStudents.has(sid)) {
    svSelectedStudents.delete(sid);
  } else {
    svSelectedStudents.add(sid);
  }
  const tag = document.getElementById('svTag_'+sid);
  if (tag) tag.classList.toggle('selected');
}

function generateScheduleView() {
  if (svSelectedStudents.size === 0) {
    showToast('请至少选择一个学生');
    return;
  }
  const dateStart = document.getElementById('svDateStart').value;
  const dateEnd = document.getElementById('svDateEnd').value;
  if (!dateStart || !dateEnd) {
    showToast('请选择日期范围');
    return;
  }
  
  // 收集数据：{ "YYYY-MM-DD": { "时间段": [ { studentId, studentName, content } ] } }
  const dateMap = {};
  
  appData.schedules.forEach(sch => {
    if (!sch.lessons) return;
    const slots = (sch.timeSlots && sch.timeSlots.length) ? sch.timeSlots : [{start:'14:00',end:'16:00'}];
    
    for (const [ds, l] of Object.entries(sch.lessons)) {
      if (ds < dateStart || ds > dateEnd) continue;
      ensureSlotStates(l, sch);
      
      if (l.slotStates) {
        l.slotStates.forEach((ss, i) => {
          if (!ss) return;
          if (ss.type === 'absent') return;
          if (ss.rescheduleTo) return;
          // ★ 时间段：优先 customSlot，否则用课表 slots[i]
          let timeKey;
          if (ss.customSlot) {
            timeKey = ss.customSlot.start+'-'+ss.customSlot.end;
          } else {
            const slot = slots[i] || slots[0];
            timeKey = slot.start+'-'+slot.end;
          }
          if (!dateMap[ds]) dateMap[ds] = {};
          if (!dateMap[ds][timeKey]) dateMap[ds][timeKey] = [];
          
          // 确定这个时段属于哪个学生
          const teacherId = ss.teacherId || (sch.studentIds.length === 1 ? sch.studentIds[0] : '');
          if (teacherId && svSelectedStudents.has(teacherId)) {
            const name = getStudentName(teacherId);
            const content = ss.content || '';
            dateMap[ds][timeKey].push({ sid: teacherId, name, content });
          }
        });
      } else {
        // 旧数据
        if (l.type === 'absent') return;
        if (l.rescheduleTo) return;
        const defaultTime = (sch.timeSlots&&sch.timeSlots.length) ? sch.timeSlots.map(s=>s.start+'-'+s.end).join(';') : (sch.timeStart||'14:00')+'-'+(sch.timeEnd||'16:00');
        if (!dateMap[ds]) dateMap[ds] = {};
        if (!dateMap[ds][defaultTime]) dateMap[ds][defaultTime] = [];
        sch.studentIds.forEach(sid => {
          if (svSelectedStudents.has(sid)) {
            const name = getStudentName(sid);
            dateMap[ds][defaultTime].push({ sid, name, content: l.content || '' });
          }
        });
      }
    }
  });
  
  const dates = Object.keys(dateMap).sort();
  if (dates.length === 0) {
    document.getElementById('svStep2').innerHTML = '<div class="empty-msg">所选日期范围内暂无课程</div>';
    document.getElementById('svStep1').style.display = 'none';
    document.getElementById('svStep2').style.display = 'block';
    return;
  }
  
  const weekNames = ['日','一','二','三','四','五','六'];
  const startD = parseLocalDate(dateStart);
  const endD = parseLocalDate(dateEnd);
  
  let html = '<div style="margin-bottom:12px;display:flex;align-items:center;justify-content:space-between">';
  html += `<button class="btn btn-outline btn-sm" onclick="backToSVStep1()">← 返回选择</button>`;
  html += `<span style="font-size:12px;color:var(--text-secondary)">${dateStart} 至 ${dateEnd} · ${svSelectedStudents.size}名学生 · ${dates.length}天有课</span>`;
  html += `<button class="btn btn-primary btn-sm" onclick="downloadScheduleImage()">📷 下载图片</button>`;
  html += '</div>';
  html += '<div id="scheduleImageTarget">';
  
  // 按月生成月历网格
  let cur = new Date(startD.getFullYear(), startD.getMonth(), 1);
  while (cur <= endD) {
    const y = cur.getFullYear();
    const m = cur.getMonth();
    const firstDay = new Date(y, m, 1);
    const lastDay = new Date(y, m + 1, 0);
    const daysInMonth = lastDay.getDate();
    const firstOffset = firstDay.getDay();
    
    html += `<div class="month-block"><div class="month-title">📅 ${y}年${m+1}月</div>`;
    html += '<table class="month-table"><thead><tr>';
    weekNames.forEach((n, i) => html += `<th class="${i>=5?'weekend':''}">${n}</th>`);
    html += '</tr></thead><tbody>';
    
    let cellCount = 0;
    let rowHtml = '<tr>';
    for (let i = 0; i < firstOffset; i++) { rowHtml += '<td class="cell-empty"></td>'; cellCount++; }
    
    for (let day = 1; day <= daysInMonth; day++) {
      const ds = toLocalDateStr(new Date(y, m, day));
      const inRange = ds >= dateStart && ds <= dateEnd;
      const info = dateMap[ds];
      
      let cellContent = `<div class="day-num">${day}</div>`;
      
      if (info && inRange) {
        // 有课：显示学生名+时间段
        const timeKeys = Object.keys(info).sort();
        cellContent += '<div class="cell-content" style="font-size:9px;line-height:1.4">';
        timeKeys.forEach(tk => {
          const names = [...new Set(info[tk].map(e => e.name))];
          cellContent += `<div style="margin:1px 0"><span style="color:#3b82f6;font-weight:600">${tk}</span></div>`;
          cellContent += `<div style="margin:1px 0;padding-left:4px">${names.map(n => escHtml(n)).join('、')}</div>`;
        });
        cellContent += '</div>';
        rowHtml += `<td class="cell-scheduled">${cellContent}</td>`;
      } else if (inRange) {
        cellContent += `<div class="day-date">${m+1}/${day}</div>`;
        rowHtml += `<td class="cell-inrange">${cellContent}</td>`;
      } else {
        cellContent += `<div class="day-date">${m+1}/${day}</div>`;
        rowHtml += `<td class="cell-outrange">${cellContent}</td>`;
      }
      
      cellCount++;
      if (cellCount % 7 === 0) { rowHtml += '</tr>'; html += rowHtml; rowHtml = '<tr>'; }
    }
    while (cellCount % 7 !== 0) { rowHtml += '<td class="cell-empty"></td>'; cellCount++; }
    if (rowHtml !== '<tr>') { rowHtml += '</tr>'; html += rowHtml; }
    html += '</tbody></table></div>';
    
    cur.setMonth(cur.getMonth() + 1);
  }
  html += '</div>'; // close scheduleImageTarget

      </div>`;

  }

  // 累计统计
  let allLessons=0, allFee=0;

    allFee += s.totalFee;
  });
  // ★ 修复：累计平均课时费 = 全部总费用 / 全部总节数
  const allAvg = allLessons > 0 ? (allFee / allLessons).toFixed(0) : '-';

  // 各学期卡片
  const semestersHtml = studentSchedules.map(sch=>{
    const { totalLessons, totalFee, totalAbsent, monthly } = calcScheduleStats(sch);
    const sortedMonths = Object.keys(monthly).sort();
    const monthDetailHtml = sortedMonths.map(mk=>`<tr><td>${mk}</td><td>${monthly[mk].lessons}节</td><td style="text-align:right">¥${monthly[mk].fee.toFixed(0)}</td></tr>`).join('');

    // 上课明细（按时段拆分，含请假记录）
    const detailRows = [];
    if (sch.lessons) {
      const weekNames2 = ['日','一','二','三','四','五','六'];
      const slots = (sch.timeSlots && sch.timeSlots.length) ? sch.timeSlots : [{start:'14:00',end:'16:00'}];
      for (const [ds, l] of Object.entries(sch.lessons)) {
        ensureSlotStates(l, sch);
        const d = parseLocalDate(ds);
        if (l.slotStates) {
          l.slotStates.forEach((ss, i) => {
            if (!ss) return; // 跳过 undefined（非课表日期的空时段）
            if (ss.type === 'absent') {
              const timeS = (ss.customSlot) ? ss.customSlot.start+'-'+ss.customSlot.end : ((slots[i]||slots[0]).start+'-'+(slots[i]||slots[0]).end);
              detailRows.push({ date:ds, week:'周'+weekNames2[d.getDay()], time:timeS, content:'🚫 请假', fee:0, isAbsent:true, isAdjust:false, isMakeup:false });
              return;
            }
            if (ss.rescheduleTo) return;
            // ★ 时间段：优先 customSlot
            let timeStr;

              timeStr = ss.customSlot.start+'-'+ss.customSlot.end;
            } else {
              const slot = slots[i] || slots[0];
              timeStr = slot.start+'-'+slot.end;

            const isMakeup = ss.type === 'makeup';
            detailRows.push({ date:ds, week:'周'+weekNames2[d.getDay()], time:timeStr, content:ss.content||'-', fee:sch.feePerClass, isAbsent:false, isAdjust:isAdj, isMakeup });

            continue;
          }
          if (l.rescheduleTo) continue;
          const defaultSchTime = (sch.timeSlots&&sch.timeSlots.length) ? sch.timeSlots.map(s=>s.start+'-'+s.end).join(';') : (sch.timeStart||'14:00')+'-'+(sch.timeEnd||'16:00');
          const isAdj = l.type === 'adjust' || !!l.rescheduleFrom;

    detailRows.sort((a,b)=>a.date.localeCompare(b.date));

      } else if (isAdjust2) {
        rowStyle2 = ' style="background:#dbeafe"';
        tagHtml2 = ' <span style="font-size:10px;background:#bfdbfe;color:#1e40af;padding:1px 5px;border-radius:4px">调课</span>';
      }
      return `<tr${rowStyle2}><td>${r.date}</td><td>${r.week}</td><td>${r.time}</td><td>${escHtml(r.content)}${tagHtml2}</td><td style="text-align:right">¥${r.fee}</td></tr>`;
    }).join('');

    const wdNames = ['一','二','三','四','五','六','日'];
    return `<div class="semester-item" onclick="toggleSemesterDetail(this)">
      <div class="sem-header">
        <div>
          <div class="sem-name">📅 ${sch.semester}学期 ${sch.year}</div>
          <div class="sem-meta">${sch.dateStart} 至 ${sch.dateEnd} · 周${sch.weekdays.map(d=>wdNames[d-1]).join('、')}上课 · ¥${sch.feePerClass}/节 · 上课${totalLessons}节${totalAbsent?' · 请假'+totalAbsent+'节':''}</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <button class="btn btn-xs btn-outline" style="font-size:11px;padding:3px 7px" onclick="event.stopPropagation();generateSettleImage('${sch.id}')" title="生成结算图片发给家长">📸 对账单</button>
          <div class="sem-fee">¥${totalFee.toFixed(0)}</div>
        </div>
      </div>
      <div class="semester-detail">
        <table class="monthly-table" style="margin-top:8px">
          <thead><tr><th>月份</th><th>节数</th><th style="text-align:right">费用</th></tr></thead>
          <tbody>${monthDetailHtml}
            <tr style="font-weight:600;background:#f0fdf4"><td>合计</td><td>${totalLessons}节</td><td style="text-align:right;color:var(--primary)">¥${totalFee.toFixed(0)}</td></tr>
          </tbody>
        </table>
        <h4 style="font-size:12px;font-weight:600;margin:12px 0 6px">📋 上课明细</h4>
        <table class="lesson-detail-table">
          <thead><tr><th>日期</th><th>星期</th><th>时间</th><th>课程内容</th><th style="text-align:right">费用</th></tr></thead>
          <tbody>${detailHtml}
            <tr style="font-weight:600;background:#f0fdf4"><td colspan="4">合计</td><td style="text-align:right;color:var(--primary)">¥${totalFee.toFixed(0)}</td></tr>
          </tbody>
        </table>
        ${totalAbsent > 0 ? `<div style="background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:8px 12px;margin-top:10px;font-size:12px;color:#dc2626">🚫 请假备注：共请假 <strong>${totalAbsent}</strong> 个时段，不计入费用。</div>` : ''}
      </div>
    </div>`;
  }).join('');

  container.innerHTML = `${selectorHtml}
    <div class="student-stats-row">
      <div class="stat-card"><div class="sc-label">💰 累计总学费</div><div class="sc-value">¥${allFee.toFixed(0)}</div></div>

      <div class="stat-card"><div class="sc-label">📅 排课学期数</div><div class="sc-value">${studentSchedules.length}</div></div>
      <div class="stat-card highlight"><div class="sc-label">🏷 平均课时费</div><div class="sc-value">¥${allAvg}</div></div>
    </div>
    <div class="mine-card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <h4 style="margin-bottom:0">📚 ${escHtml(student.name)} 的排课记录</h4>
        <div style="display:flex;gap:6px">

          <button class="btn btn-primary btn-sm" onclick="switchTab('schedule')">＋ 新建排课</button>

      <div class="semester-list">${semestersHtml}</div>

  body{font-family:"Microsoft YaHei","PingFang SC",sans-serif;padding:40px;color:#333;line-height:1.8}
  h1{text-align:center;color:#4f46e5;font-size:22px;margin-bottom:4px}
  .sub{text-align:center;color:#888;font-size:13px;margin-bottom:24px}
  .info{padding:12px 16px;background:#f5f5f5;border-radius:6px;margin-bottom:16px}
  .info .student{font-size:16px;font-weight:bold}
  .summary{text-align:center;margin:20px 0}
  .summary .total{display:inline-block;background:#fef3c7;font-size:24px;font-weight:bold;padding:8px 30px;border-radius:10px;color:#92400e}
  .stats{margin:16px 0;display:flex;gap:12px}
  .stat{flex:1;text-align:center;padding:10px;background:#f1f5f9;border-radius:6px}
  .stat .label{font-size:11px;color:#888}.stat .value{font-size:16px;font-weight:bold}
  h3{font-size:14px;margin:20px 0 8px}
  table{width:100%;border-collapse:collapse;margin-bottom:12px;font-size:13px}
  th{background:#f8fafc;padding:8px 10px;text-align:left;border-bottom:2px solid #e2e8f0;font-weight:600}
  td{padding:8px 10px;border-bottom:1px solid #e2e8f0}
  .num{text-align:right}
  .total-row td{font-weight:bold;background:#f0fdf4;border-top:2px solid #16a34a}
  .footer{text-align:center;color:#aaa;font-size:11px;margin-top:30px;padding-top:12px;border-top:1px solid #eee}
</style></head>
<body>
<h1>📚 课时费结算单</h1>
<div class="sub">${sch.semester}学期 ${sch.year} · ${sch.dateStart} 至 ${sch.dateEnd} · 生成日期：${dateStr}</div>
<div class="info"><span class="student">👤 学生：${escHtml(studentName)}</span></div>
<div class="stats">
  <div class="stat"><div class="label">📖 上课节数</div><div class="value">${totalLessons}</div></div>
  <div class="stat"><div class="label">🚫 请假节数</div><div class="value">${totalAbsent}</div></div>
  <div class="stat"><div class="label">🏷 平均/节</div><div class="value">¥${avgFeePerLesson.toFixed(0)}</div></div>
</div>
<div class="summary"><div class="total">合计：¥${totalFee.toFixed(0)}</div></div>
<h3>📅 月度明细</h3>
<table><thead><tr><th>月份</th><th class="num">节数</th><th class="num">费用</th></tr></thead>
<tbody>${monthRows}<tr class="total-row"><td>合计</td><td class="num">${totalLessons}节</td><td class="num">¥${totalFee.toFixed(0)}</td></tr></tbody></table>
${detailRows.length > 0 ? `<h3>📋 上课明细</h3>
<table><thead><tr><th>日期</th><th>星期</th><th>时间</th><th>课程内容</th><th class="num">费用</th></tr></thead>
<tbody>${detailHtml}<tr class="total-row"><td colspan="4">合计</td><td class="num">¥${totalFee.toFixed(0)}</td></tr></tbody></table>` : ''}
<div class="footer">本结算单由课时费计算工具自动生成 · 仅供参考</div>
</body></html>`;

  const blob = new Blob(['\ufeff'+wordHtml], {type:'application/msword'});
  const link = document.createElement('a');
  link.download = `课时费结算_${studentName}_${sch.semester}学期${sch.year}_${dateStr}.doc`;
  link.href = URL.createObjectURL(blob);
  link.click();
  URL.revokeObjectURL(link.href);
  showToast('✅ Word 文档已导出！');
}

document.addEventListener('keydown',e=>{ if(e.key==='Escape'){ closeAddStudentModal(); closeRescheduleModal(); closeMakeupModal(); closeScheduleView(); } });
document.getElementById('addStudentModal').addEventListener('click',function(e){if(e.target===this)closeAddStudentModal();});
document.getElementById('rescheduleModal').addEventListener('click',function(e){if(e.target===this)closeRescheduleModal();});
document.getElementById('makeupModal').addEventListener('click',function(e){if(e.target===this)closeMakeupModal();});
document.getElementById('scheduleViewModal').addEventListener('click',function(e){if(e.target===this)closeScheduleView();});
</script>
</body>
</html>
